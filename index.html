<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行手帳PDF生成器</title>
    <style>
        /* 全域樣式設定 */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', 'PingFang SC', 'Segoe UI', sans-serif;
            background-color: #f5f7fa;
            color: #333333;
        }

        /* 網頁後台操作界面樣式 */
        .admin-container {
            max-width: 850px;
            margin: 40px auto;
            padding: 35px;
            background-color: #ffffff;
            border-radius: 14px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.06);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 35px;
            font-size: 26pt;
            font-weight: bold;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 11pt;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        .slider-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8fafc;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #3498db;
        }

        .slider-val {
            font-weight: bold;
            color: #3498db;
            font-size: 13pt;
            min-width: 45px;
            text-align: right;
        }

        .section-title {
            margin-top: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            color: #2c3e50;
            font-weight: bold;
            font-size: 13pt;
        }

        .city-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .city-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fdfdfd;
            padding: 8px 12px;
            border: 1px solid #edf2f7;
            border-radius: 6px;
        }

        .city-label {
            font-weight: bold;
            color: #718096;
            min-width: 65px;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #2ecc71;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14pt;
            font-weight: bold;
            cursor: pointer;
            margin-top: 35px;
            transition: background-color 0.2s;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }

        .btn-submit:hover {
            background-color: #27ae60;
        }

        /* PDF 預覽與列印專用隱藏區塊 */
        #print-area {
            display: none;
        }

        /* ------------------------------------------
           PDF 列印專用樣式規格 (A4 直向)
        ------------------------------------------ */
        @media print {
            .admin-container {
                display: none !important;
            }

            #print-area {
                display: block !important;
            }

            body {
                background-color: #ffffff;
            }

            @page {
                size: A4 portrait;
                margin: 0;
            }

            .pdf-page {
                width: 210mm;
                height: 296.6mm; /* 精準適配 A4 防止非預期溢出 */
                page-break-after: always;
                position: relative;
                background-color: #ffffff;
                padding: 22mm 18mm 20mm 18mm;
                overflow: hidden;
                box-sizing: border-box;
            }

            .pdf-page:last-child {
                page-break-after: avoid;
            }

            /* 手寫橫線與間距控制 */
            .ul-line {
                border-bottom: 1px solid #000000;
                display: inline-block;
                min-width: 110mm;
                height: 24px;
                vertical-align: bottom;
            }

            .short-line {
                min-width: 45mm;
            }

            /* 頁底裝飾標籤與連續頁碼 */
            .page-number {
                position: absolute;
                bottom: 12mm;
                left: 0;
                right: 0;
                text-align: center;
                font-size: 10pt;
                color: #888888;
            }

            .footer-left {
                position: absolute;
                bottom: 12mm;
                left: 18mm;
                font-size: 10pt;
                color: #888888;
            }

            .footer-right {
                position: absolute;
                bottom: 12mm;
                right: 18mm;
                font-size: 10pt;
                color: #888888;
                text-align: right;
            }

            /* 二欄式版面 */
            .layout-table {
                display: table;
                width: 100%;
                table-layout: fixed;
            }

            .layout-cell {
                display: table-cell;
                vertical-align: top;
            }

            /* 標準表格樣式 (無橫線填滿，純外框格線) */
            .data-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
                margin-bottom: 15px;
            }

            .data-table th, .data-table td {
                border: 1px solid #CCCCCC;
                padding: 8px;
                text-align: left;
                vertical-align: middle;
                font-size: 11pt;
            }

            .data-table th {
                background-color: #fcfcfc;
                font-weight: bold;
                font-size: 12pt;
            }

            /* 字體尺寸規範 */
            .title-large { font-size: 56pt; font-weight: bold; }
            .title-main { font-size: 16pt; font-weight: bold; }
            .title-sub { font-size: 14pt; font-weight: bold; color: #111111; margin-top: 15px; margin-bottom: 10px; }
            .text-normal { font-size: 12pt; }

            /* 航班與住宿特別高行距 */
            .line-height-double p {
                line-height: 2.0 !important;
                margin: 6px 0;
            }

            /* 封面專用佈局 */
            .cover-container {
                text-align: center;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            .cover-date {
                position: absolute;
                bottom: 25mm;
                right: 5mm;
                font-size: 12pt;
            }

            /* 每日行程時間軸排版 */
            .timeline-box {
                margin-top: 15px;
                margin-bottom: 20px;
            }
            .timeline-row {
                display: table;
                width: 100%;
                margin-bottom: 12px;
            }
            .timeline-time {
                display: table-cell;
                width: 65px;
                font-weight: bold;
                font-size: 12pt;
                color: #444444;
                vertical-align: bottom;
            }
            .timeline-line {
                display: table-cell;
                border-bottom: 1px solid #000000;
                height: 22px;
            }

            /* 天氣與頂部中繼狀態 */
            .header-meta-right {
                text-align: right;
                font-size: 12pt;
                line-height: 1.6;
            }
            .weather-circle-box {
                font-size: 13pt;
                letter-spacing: 6px;
                border: 1px dashed #CCCCCC;
                padding: 3px 8px;
                border-radius: 4px;
                display: inline-block;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>✈️ 旅行手帳 PDF 生成器</h1>
        
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="trip-name">旅程名稱</label>
                <input type="text" id="trip-name" placeholder="例如：2026 東京之旅 / 2026 曼谷遊" value="東京春櫻漫遊 2026">
            </div>

            <div class="form-group">
                <label for="start-date">出發日期</label>
                <input type="date" id="start-date">
            </div>

            <div class="form-group">
                <label for="currency">貨幣符號</label>
                <input type="text" id="currency" placeholder="例如：¥ / ฿ / € / $" value="¥">
            </div>

            <div class="form-group">
                <label for="trip-days">旅行日數 (1 - 30 日)</label>
                <div class="slider-box">
                    <input type="range" id="trip-days" min="1" max="30" value="5" oninput="updateDays(this.value)">
                    <span id="days-val" class="slider-val">5 日</span>
                </div>
            </div>

            <div class="form-group">
                <label for="hotel-count">住宿數量 (1 - 10 間)</label>
                <div class="slider-box">
                    <input type="range" id="hotel-count" min="1" max="10" value="2" oninput="updateHotels(this.value)">
                    <span id="hotel-val" class="slider-val">2 間</span>
                </div>
            </div>
        </div>

        <div class="section-title">每日主打城市／地區設定</div>
        <div id="city-inputs-container" class="city-grid">
            </div>

        <button type="button" class="btn-submit" onclick="buildJournalPDF()">✨ 生成手帳 PDF</button>
    </div>

    <div id="print-area"></div>

    <script>
        // 設定今日為預設出發日期
        document.getElementById('start-date').valueAsDate = new Date();

        function updateDays(val) {
            document.getElementById('days-val').innerText = val + ' 日';
            renderCityInputs(parseInt(val));
        }

        function updateHotels(val) {
            document.getElementById('hotel-val').innerText = val + ' 間';
        }

        // 動態生成每日城市輸入格
        function renderCityInputs(days) {
            const container = document.getElementById('city-inputs-container');
            container.innerHTML = '';
            const sampleCities = ["東京", "河口湖", "箱根", "鐮倉", "橫濱"];
            
            for (let i = 1; i <= days; i++) {
                const sample = sampleCities[(i - 1) % sampleCities.length];
                const div = document.createElement('div');
                div.className = 'city-item';
                div.innerHTML = `
                    <span class="city-label">Day ${i} :</span>
                    <input type="text" id="city-day-${i}" value="${sample}">
                `;
                container.appendChild(div);
            }
        }
        // 初始載入 5 天範例
        renderCityInputs(5);

        // 簡約線條旅行主題 SVG 圖案庫 (stroke-width: 1px, 顏色: #D0D0D0)
        const svgDecorations = [
            // 飛機
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="38" height="38"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l8 2.5z"/></svg>`,
            // 地球
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="38" height="38"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
            // 行李箱
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="38" height="38"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M16 7V4a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3M3 12h18M9 12v8m6-8v8"/></svg>`,
            // 相機
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="38" height="38"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
            // 船
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="38" height="38"><path d="M2 17l3-6h14l3 6H2zM12 2v9M12 5h5M7 11V8h3"/></svg>`,
            // 火車
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="38" height="38"><rect x="4" y="3" width="16" height="15" rx="2"/><circle cx="8" cy="14" r="1"/><circle cx="16" cy="14" r="1"/><path d="M2 21h20M5 9h14M9 3v6m6-6v6"/></svg>`,
            // 指南針
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="38" height="38"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>`
        ];

        // 隨機抽取並分發 2-3 個線條圖案到頁面角落
        function getCornerDecorations() {
            const count = Math.random() > 0.5 ? 3 : 2;
            const shuffled = [...svgDecorations].sort(() => 0.5 - Math.random());
            const picked = shuffled.slice(0, count);
            
            const positions = [
                "top: 5mm; left: 5mm;",
                "top: 5mm; right: 5mm;",
                "bottom: 18mm; left: 5mm;",
                "bottom: 18mm; right: 5mm;"
            ];
            const shuffledPos = positions.sort(() => 0.5 - Math.random());
            
            let html = '';
            for(let i = 0; i < count; i++) {
                html += `<div style="position: absolute; ${shuffledPos[i]} z-index: 10;">${picked[i]}</div>`;
            }
            return html;
        }

        // 遞增計算推導日期字串
        function calculateDateStr(baseDateStr, offset) {
            if (!baseDateStr) return '____-__-__';
            const d = new Date(baseDateStr);
            d.setDate(d.getDate() + offset);
            const yy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            return `${yy}-${mm}-${dd} (${weekDays[d.getDay()]})`;
        }

        // 生成統一規格的時間軸 HTML
        function buildTimeline(start, end) {
            let html = '<div class="timeline-box">';
            for(let h = start; h <= end; h++) {
                const hourLabel = String(h).padStart(2, '0') + ':00';
                html += `
                    <div class="timeline-row">
                        <div class="timeline-time">${hourLabel}</div>
                        <div class="timeline-line"></div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }

        // 核心組裝機制
        function buildJournalPDF() {
            const tripName = document.getElementById('trip-name').value || '隨心漫遊旅行手帳';
            const startDate = document.getElementById('start-date').value;
            const currency = document.getElementById('currency').value || '$';
            const totalDays = parseInt(document.getElementById('trip-days').value);
            const hotelCount = parseInt(document.getElementById('hotel-count').value);

            const totalPages = 4 + (totalDays * 3) + 2;
            let pageNumTracker = 1;
            let fullHTML = '';

            // 封裝單頁排版外殼
            function wrapPage(innerMarkup) {
                const decors = getCornerDecorations();
                const container = `
                    <div class="pdf-page">
                        ${decors}
                        ${innerMarkup}
                        <div class="footer-left">cms.hongkong-travel.journal.generator</div>
                        <div class="page-number">${pageNumTracker} / ${totalPages}</div>
                        <div class="footer-right">${tripName}</div>
                    </div>
                `;
                pageNumTracker++;
                return container;
            }

            // 基礎空表格構造器
            function createFormTable(th1, th2, th3, rowsCount = 3) {
                let rowsHtml = '';
                for(let r=0; r<rowsCount; r++) {
                    rowsHtml += `<tr><td style="height:32px;"></td><td></td><td></td></tr>`;
                }
                return `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 45%;">${th1}</th>
                                <th style="width: 20%;">${th2}</th>
                                <th style="width: 35%;">${th3}</th>
                            </tr>
                        </thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                `;
            }

            /* ==========================================
               第1頁：封面頁
            ========================================== */
            const coverHtml = `
                <div class="cover-container">
                    <div class="cover-title title-large" style="margin-top: 75mm;">${tripName}</div>
                    <div class="cover-date text-normal">出發日期：${startDate || '____ 年 __ 月 __ 日'}</div>
                </div>
            `;
            fullHTML += wrapPage(coverHtml);

            /* ==========================================
               第2頁：航班&酒店檔案
            ========================================== */
            let dynamicHotelsHtml = '';
            for(let h = 1; h <= hotelCount; h++) {
                dynamicHotelsHtml += `
                    <div style="margin-bottom: 12px; border-bottom: 1px dashed #CCCCCC; padding-bottom: 10px;">
                        <span class="title-sub" style="margin-top:0; display:block;">🏨 住宿資料 ${h}</span>
                        <p class="text-normal">酒店名：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">地址：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">電話：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">Check-in時間：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">Check-out時間：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">包早餐：□ 包 ＆nbsp;＆nbsp; □ 唔包</p>
                        <p class="text-normal">免費取消期限：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">幾多晚：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">價錢：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">免費泊車：□ 有 ＆nbsp;＆nbsp; □ 無</p>
                        <p class="text-normal">預訂編號：<span class="ul-line short-line"></span></p>
                    </div>
                `;
            }

            const flightAndHotelHtml = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px;">Flight & Hotel 檔案</div>
                <div class="layout-table line-height-double">
                    <div class="layout-cell" style="width: 48%; padding-right: 30px;">
                        <span class="title-sub" style="margin-top:0; display:block;">出發航班 ✈️</span>
                        <p class="text-normal">航班編號：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">出發時間：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">到達時間：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">Terminal：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">座位：<span class="ul-line short-line"></span></p>
                        <p class="text-normal">機票價錢：<span class="ul-line short-line"></span></p>
                        
                        <div style="margin-top: 30px;">
                            <span class="title-sub" style="display:block;">回程航班 ✈️</span>
                            <p class="text-normal">航班編號：<span class="ul-line short-line"></span></p>
                            <p class="text-normal">出發時間：<span class="ul-line short-line"></span></p>
                            <p class="text-normal">到達時間：<span class="ul-line short-line"></span></p>
                            <p class="text-normal">Terminal：<span class="ul-line short-line"></span></p>
                            <p class="text-normal">座位：<span class="ul-line short-line"></span></p>
                            <p class="text-normal">機票價錢：<span class="ul-line short-line"></span></p>
                        </div>
                    </div>
                    <div class="layout-cell" style="width: 52%; border-left: 1px dashed #CCCCCC; padding-left: 30px; max-height: 245mm; overflow: hidden;">
                        ${dynamicHotelsHtml}
                    </div>
                </div>
            `;
            fullHTML += wrapPage(flightAndHotelHtml);

            /* ==========================================
               第3頁：緊急聯絡&保險
            ========================================== */
            const emergencyHtml = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 25px;">緊急聯絡 & 保險檔案</div>
                
                <div class="title-sub">🚨 當地緊急求助電話</div>
                <p class="text-normal" style="margin-bottom: 30px;">當地緊急求助電話：<span class="ul-line"></span></p>
                
                <div class="title-sub">👥 緊急通知聯絡人</div>
                <table class="data-table" style="margin-bottom: 40px;">
                    <tr>
                        <td style="height: 55px; width: 33.3%;">聯絡人：<br><br>電話：</td>
                        <td style="width: 33.3%;">聯絡人：<br><br>電話：</td>
                        <td style="width: 33.3%;">聯絡人：<br><br>電話：</td>
                    </tr>
                    <tr>
                        <td style="height: 55px;">聯絡人：<br><br>電話：</td>
                        <td>聯絡人：<br><br>電話：</td>
                        <td>聯絡人：<br><br>電話：</td>
                    </tr>
                </table>

                <div class="title-sub">🛡️ 旅遊保險明細</div>
                <div style="line-height: 2.2;">
                    <p class="text-normal">保險公司：<span class="ul-line"></span></p>
                    <p class="text-normal">保險熱線：<span class="ul-line"></span></p>
                    <p class="text-normal">保單編號：<span class="ul-line"></span></p>
                    <p class="text-normal">保險費用：<span class="ul-line"></span></p>
                </div>
            `;
            fullHTML += wrapPage(emergencyHtml);

            /* ==========================================
               第4頁：總行程一覽
            ========================================== */
            let overviewRows = '';
            for(let i = 1; i <= totalDays; i++) {
                const dateDetail = calculateDateStr(startDate, i - 1);
                const cityValue = document.getElementById(`city-day-${i}`).value || '自由行';
                overviewRows += `
                    <tr>
                        <td style="height: 42px;"><strong>Day ${i}</strong><br><span style="font-size:10pt; color:#666;">${dateDetail}</span></td>
                        <td><strong>${cityValue}</strong></td>
                        <td></td>
                    </tr>
                `;
            }
            const overviewHtml = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;">總行程一覽 Overview</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 30%;">日期</th>
                            <th style="width: 35%;">主打城市 / 地區</th>
                            <th style="width: 35%;">今晚住邊間酒店 (打印後手寫)</th>
                        </tr>
                    </thead>
                    <tbody>${overviewRows}</tbody>
                </table>
            `;
            fullHTML += wrapPage(overviewHtml);

            /* ==========================================
               每日行程頁（每日3頁，自動重複）
            ========================================== */
            for(let i = 1; i <= totalDays; i++) {
                const dateDetail = calculateDateStr(startDate, i - 1);
                const cityValue = document.getElementById(`city-day-${i}`).value || '自由行';

                // ---- ▶ 每日第1頁（早上頁） ----
                const morningTimelineHtml = buildTimeline(6, 12);
                const morningTableEat = createFormTable("食物名稱", "價錢", "備註", 2);
                const morningTableBuy = createFormTable("物品名稱", "價錢", "購買地點", 2);
                
                const morningHtml = `
                    <div class="layout-table" style="border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 15px;">
                        <div class="layout-cell" style="vertical-align: bottom;">
                            <div class="title-main">Day ${i} ｜ ${cityValue} ｜ ${dateDetail.split(' ')[0]}</div>
                        </div>
                        <div class="layout-cell header-meta-right" style="width: 190px;">
                            <div class="weather-circle-box">☀️ ☁️ 🌧️</div><br>
                            起床：<span class="ul-line" style="min-width:35px; height:18px;"></span>:<span class="ul-line" style="min-width:35px; height:18px;"></span><br>
                            出門：<span class="ul-line" style="min-width:35px; height:18px;"></span>:<span class="ul-line" style="min-width:35px; height:18px;"></span>
                        </div>
                    </div>
                    <div class="title-sub" style="margin-top:10px;">🌅 朝早行程時間軸 (06:00 - 12:00)</div>
                    ${morningTimelineHtml}
                    <div class="title-sub">🍳 食咗咩</div>
                    ${morningTableEat}
                    <div class="title-sub">🛍️ 買咗咩</div>
                    ${morningTableBuy}
                `;
                fullHTML += wrapPage(morningHtml);

                // ---- ▶ 每日第2頁（中午至下午頁） ----
                const afternoonTimelineHtml = buildTimeline(12, 18);
                const afternoonTableEat = createFormTable("食物名稱", "價錢", "備註", 3);
                const afternoonTableBuy = createFormTable("物品名稱", "價錢", "購買地點", 3);

                const afternoonHtml = `
                    <div class="layout-table" style="border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 15px;">
                        <div class="layout-cell" style="vertical-align: bottom;">
                            <div class="title-main">Day ${i} ｜ ${cityValue} ｜ ${dateDetail.split(' ')[0]}</div>
                        </div>
                        <div class="layout-cell header-meta-right" style="width: 120px;">
                            <div class="weather-circle-box">☀️ ☁️ 🌧️</div>
                        </div>
                    </div>
                    <div class="title-sub" style="margin-top:10px;">☀️ 下午行程時間軸 (12:00 - 18:00)</div>
                    ${afternoonTimelineHtml}
                    <div class="title-sub">🍱 食咗咩</div>
                    ${afternoonTableEat}
                    <div class="title-sub">🛍️ 買咗咩</div>
                    ${afternoonTableBuy}
                `;
                fullHTML += wrapPage(afternoonHtml);

                // ---- ▶ 每日第3頁（晚上頁） ----
                const eveningTimelineHtml = buildTimeline(18, 23);
                const eveningTableEat = createFormTable("食物名稱", "價錢", "備註", 2);
                const eveningTableBuy = createFormTable("物品名稱", "價錢", "購買地點", 2);

                const eveningHtml = `
                    <div class="layout-table" style="border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 15px;">
                        <div class="layout-cell" style="vertical-align: bottom;">
                            <div class="title-main">Day ${i} ｜ ${cityValue} ｜ ${dateDetail.split(' ')[0]}</div>
                        </div>
                        <div class="layout-cell header-meta-right" style="width: 120px;">
                            <div class="weather-circle-box">☀️ ☁️ 🌧️</div>
                        </div>
                    </div>
                    <div class="title-sub" style="margin-top:10px;">🌙 晚上行程時間軸 (18:00 - 23:00)</div>
                    ${eveningTimelineHtml}
                    <div class="title-sub">🌌 食咗咩</div>
                    ${eveningTableEat}
                    <div class="title-sub">🛍️ 買咗咩</div>
                    ${eveningTableBuy}
                    
                    <div style="margin-top: 25px; padding: 12px; border: 1px dashed #888888; border-radius: 6px; background-color: #fafafa;">
                        <span style="font-weight: bold; font-size: 12pt; display: inline-block; margin-right: 15px;">💰 全日支出總結 (${currency}) :</span>
                        <span class="text-normal">交通：<span class="ul-line" style="min-width:22mm; height:18px;"></span></span> ＆nbsp;＆nbsp;
                        <span class="text-normal">飲食：<span class="ul-line" style="min-width:22mm; height:18px;"></span></span> ＆nbsp;＆nbsp;
                        <span class="text-normal">購物：<span class="ul-line" style="min-width:22mm; height:18px;"></span></span> ＆nbsp;＆nbsp;
                        <span class="text-normal">雜項：<span class="ul-line" style="min-width:22mm; height:18px;"></span></span> ＆nbsp;＆nbsp;
                        <span class="text-normal" style="font-weight:bold;">合計：<strong>${currency}</strong><span class="ul-line" style="min-width:25mm; height:18px; border-bottom-width:2px;"></span></span>
                    </div>
                `;
                fullHTML += wrapPage(eveningHtml);
            }

            /* ==========================================
               後置頁面：倒數第2頁單據收納頁 ＆ 最後1頁地圖貼貼頁
            ========================================== */
            // 倒數第2頁
            fullHTML += wrapPage(`<div class="title-main" style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px;">單據收納頁 Receipts Collection</div><div style="height: 230mm;"></div>`);
            
            // 最後1頁
            fullHTML += wrapPage(`<div class="title-main" style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px;">地圖 / 景點單張紀念頁</div><div style="height: 230mm;"></div>`);

            // 寫入並列印
            document.getElementById('print-area').innerHTML = fullHTML;
            window.print();
        }
    </script>
</body>
</html>
