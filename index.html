<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行手帳PDF生成器</title>
    <style>
        /* 全域樣式設定 */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', 'PingFang SC', 'Segoe UI', sans-serif;
            background-color: #f4f6f9;
            color: #333333;
        }

        /* 網頁操作界面樣式 */
        .admin-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24pt;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
        }

        input[type="text"], input[type="date"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 11pt;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        .slider-container {
            display: table;
            width: 100%;
        }

        .slider-cell {
            display: table-cell;
            vertical-align: middle;
        }

        input[type="range"] {
            width: 85%;
            margin-right: 15px;
        }

        #days-val, #hotel-val {
            font-weight: bold;
            color: #3498db;
            font-size: 12pt;
        }

        .city-inputs-title {
            margin-top: 25px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
            color: #2c3e50;
            font-weight: bold;
        }

        .city-grid {
            margin-top: 15px;
        }

        .city-item {
            margin-bottom: 12px;
            display: table;
            width: 100%;
        }

        .city-label {
            display: table-cell;
            width: 90px;
            font-weight: bold;
            vertical-align: middle;
            color: #7f8c8d;
        }

        .city-input-cell {
            display: table-cell;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14pt;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #27ae60;
        }

        /* PDF 預覽與列印容器 */
        #print-area {
            display: none;
        }

        /* ------------------------------------------
           PDF 列印專用樣式規格 (A4 直向)
        ------------------------------------------ */
        @media print {
            .admin-container {
                display: none !important;
            }

            #print-area {
                display: block !important;
            }

            body {
                background-color: #ffffff;
            }

            @page {
                size: A4 portrait;
                margin: 0;
            }

            .pdf-page {
                width: 210mm;
                height: 296.8mm;
                page-break-after: always;
                position: relative;
                background-color: #ffffff;
                padding: 20mm 15mm;
                overflow: hidden;
                box-sizing: border-box;
            }

            /* 完全空白頁面樣式設定 */
            .blank-page {
                width: 210mm;
                height: 296.8mm;
                page-break-after: always;
                background-color: #ffffff;
                box-sizing: border-box;
            }

            .pdf-page:last-child, .blank-page:last-child {
                page-break-after: avoid;
            }

            /* 通用手寫橫線樣式 */
            .ul-line {
                border-bottom: 1px solid #000000;
                display: inline-block;
                min-width: 60px;
                height: 22px;
                vertical-align: bottom;
                margin-bottom: 2px;
            }

            .line-block {
                border-bottom: 1px solid #000000;
                height: 32px;
                margin-top: 5px;
            }

            /* 通用虛線框 */
            .dashed-box {
                border: 1px dashed #CCCCCC;
                border-radius: 4px;
                color: #888888;
                font-size: 12pt;
                text-align: center;
                background-color: #fafafa;
            }

            /* 頁碼及頁尾標籤 */
            .page-number {
                position: absolute;
                bottom: 12mm;
                left: 0;
                right: 0;
                text-align: center;
                font-size: 10pt;
                color: #888888;
            }

            .footer-left {
                position: absolute;
                bottom: 12mm;
                left: 15mm;
                font-size: 10pt;
                color: #888888;
            }

            .footer-right {
                position: absolute;
                bottom: 12mm;
                right: 15mm;
                font-size: 10pt;
                color: #888888;
                text-align: right;
            }

            /* 通用排版表格 */
            .layout-table {
                display: table;
                width: 100%;
                table-layout: fixed;
            }

            .layout-cell {
                display: table-cell;
                vertical-align: top;
            }

            /* 標準表格樣式 */
            .data-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 15px;
            }

            .data-table th, .data-table td {
                border: 1px solid #CCCCCC;
                padding: 8px;
                text-align: left;
                vertical-align: middle;
                font-size: 11pt;
            }

            .data-table th {
                background-color: #f9f9f9;
                font-weight: bold;
                font-size: 12pt;
            }

            /* 字體規格 */
            .title-large { font-size: 56pt; font-weight: bold; } /* 放大一倍 */
            .title-main { font-size: 16pt; font-weight: bold; margin-bottom: 15px; }
            .title-sub { font-size: 14pt; font-weight: bold; margin-top: 20px; margin-bottom: 10px; color: #111111; }
            .text-normal { font-size: 11pt; line-height: 1.8; }
            .text-muted { font-size: 11pt; color: #888888; }

            /* 封面專用頁面樣式 */
            .cover-container {
                text-align: center;
                height: 100%;
                position: relative;
            }
            .cover-title {
                margin-top: 70mm;
                padding: 0 10mm;
                line-height: 1.3;
            }
            .cover-date {
                position: absolute;
                bottom: 20mm;
                right: 5mm;
                font-size: 12pt;
            }

            /* 天氣與時間區塊 */
            .header-right-meta {
                text-align: right;
                font-size: 11pt;
                line-height: 1.6;
            }
            .weather-icons {
                font-size: 13pt;
                letter-spacing: 5px;
                border: 1px dashed #CCCCCC;
                padding: 2px 6px;
                border-radius: 4px;
                display: inline-block;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>✈️ 旅行手帳 PDF 生成器</h1>
        
        <div class="form-group">
            <label for="trip-name">旅程名稱</label>
            <input type="text" id="trip-name" placeholder="例如：2026 東京初夏之旅 / 曼谷浪漫遊" value="首爾之旅 2026">
        </div>

        <div class="form-group">
            <label for="start-date">出發日期</label>
            <input type="date" id="start-date">
        </div>

        <div class="form-group">
            <label for="currency">貨幣符號</label>
            <input type="text" id="currency" placeholder="例如：¥ / ฿ / € / $" value="₩">
        </div>

        <div class="form-group">
            <label for="trip-days">旅行日數 (1 - 30 日)</label>
            <div class="slider-container">
                <div class="slider-cell">
                    <input type="range" id="trip-days" min="1" max="30" value="5" oninput="updateDaysValue(this.value)">
                </div>
                <div class="slider-cell" style="width: 50px; text-align: right;">
                    <span id="days-val">5</span>日
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="hotel-count">住宿數量 (1 - 10 間)</label>
            <div class="slider-container">
                <div class="slider-cell">
                    <input type="range" id="hotel-count" min="1" max="10" value="1" oninput="updateHotelValue(this.value)">
                </div>
                <div class="slider-cell" style="width: 50px; text-align: right;">
                    <span id="hotel-val">1</span>間
                </div>
            </div>
        </div>

        <div class="city-inputs-title">每日主打城市／地區</div>
        <div id="city-grid-container" class="city-grid">
            </div>

        <button type="button" class="btn-submit" onclick="generateJournalPDF()">✨ 生成手帳 PDF</button>
    </div>

    <div id="print-area"></div>

    <script>
        // 初始化出發日期為今日
        document.getElementById('start-date').valueAsDate = new Date();

        function updateDaysValue(val) {
            document.getElementById('days-val').innerText = val;
            renderCityInputs(parseInt(val));
        }

        function updateHotelValue(val) {
            document.getElementById('hotel-val').innerText = val;
        }

        // 動態渲染每日城市輸入框
        function renderCityInputs(days) {
            const container = document.getElementById('city-grid-container');
            container.innerHTML = '';
            for (let i = 1; i <= days; i++) {
                const item = document.createElement('div');
                item.className = 'city-item';
                
                const labelCell = document.createElement('div');
                labelCell.className = 'city-label';
                labelCell.innerText = `Day ${i} 城市 :`;
                
                const inputCell = document.createElement('div');
                inputCell.className = 'city-input-cell';
                
                const input = document.createElement('input');
                input.type = 'text';
                input.id = `city-day-${i}`;
                input.value = `首爾`;
                
                inputCell.appendChild(input);
                item.appendChild(labelCell);
                item.appendChild(inputCell);
                container.appendChild(item);
            }
        }

        // 預先執行一次
        renderCityInputs(5);

        // 輔助功能：生成隨機角落小圖案
        function generateCornerIcons() {
            const icons = ['✈️', '🌍', '🧳', '📷', '🚢', '🚂', '🗺️', '🧭'];
            // 隨機打亂並挑選 3 個
            const shuffled = [...icons].sort(() => 0.5 - Math.random());
            const selectedIcons = shuffled.slice(0, 3);
            
            // 四個角落的位置樣式
            const positions = [
                'top: 6mm; left: 6mm;',
                'top: 6mm; right: 6mm;',
                'bottom: 18mm; left: 6mm;',
                'bottom: 18mm; right: 6mm;'
            ];
            const shuffledPos = positions.sort(() => 0.5 - Math.random());
            
            let iconsHtml = '';
            for (let i = 0; i < 3; i++) {
                iconsHtml += `<div style="position: absolute; ${shuffledPos[i]} color: #D0D0D0; font-size: 14pt; opacity: 0.8; user-select: none;">${selectedIcons[i]}</div>`;
            }
            return iconsHtml;
        }

        // 輔助功能：計算日期與星期
        function getDayDetails(startDateStr, dayOffset) {
            if (!startDateStr) return { dateStr: '____年__月__日', weekStr: '（星期一）' };
            const date = new Date(startDateStr);
            date.setDate(date.getDate() + dayOffset);
            
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            
            const weeks = ['日', '一', '二', '三', '四', '五', '六'];
            const w = weeks[date.getDay()];
            
            return {
                dateStr: `${y}-${m}-${d}`,
                weekStr: `（星期${w}）`
            };
        }

        // 輔助功能：組裝時間軸
        function generateTimelineHtml(startHour, endHour) {
            let timelineHtml = '<div style="margin-top: 15px; margin-bottom: 15px;">';
            for (let h = startHour; h <= endHour; h++) {
                const hourStr = String(h).padStart(2, '0') + ':00';
                timelineHtml += `
                    <div style="display: table; width: 100%; margin-bottom: 12px;">
                        <div style="display: table-cell; width: 55px; font-weight: bold; font-size: 11pt; color: #555; vertical-align: bottom;">${hourStr}</div>
                        <div style="display: table-cell; border-bottom: 1px solid #000000; height: 20px;"></div>
                    </div>
                `;
            }
            timelineHtml += '</div>';
            return timelineHtml;
        }

        // 核心主功能：生成 HTML 程式碼並觸發列印
        function generateJournalPDF() {
            const tripName = document.getElementById('trip-name').value || '我的旅行手帳';
            const startDate = document.getElementById('start-date').value;
            const currency = document.getElementById('currency').value || '¥';
            const totalDays = parseInt(document.getElementById('trip-days').value);
            const hotelCount = parseInt(document.getElementById('hotel-count').value);
            
            // 總內容頁數 (空白雙數頁不計入總頁數)
            const totalContentPages = 4 + (totalDays * 3) + 3;
            let currentContentPage = 1;
            
            let htmlStr = '';

            // 輔助功能：封裝內容頁面並自動插入空白頁
            function createFullPage(innerContent) {
                const cornerIcons = generateCornerIcons();
                const footers = `
                    <div class="footer-left">cms.hongkong-travel.journal.generator</div>
                    <div class="page-number">${currentContentPage} / ${totalContentPages}</div>
                    <div class="footer-right">${tripName}</div>
                `;
                currentContentPage++;
                
                // 返回：當前內容頁 + 完全空白的雙數頁
                return `
                    <div class="pdf-page">
                        ${cornerIcons}
                        ${innerContent}
                        ${footers}
                    </div>
                    <div class="blank-page"></div>
                `;
            }

            /* ==========================================
               第1頁：封面頁
            ========================================== */
            const coverContent = `
                <div class="cover-container">
                    <div class="cover-title title-large">${tripName}</div>
                    <div class="cover-date text-normal">出發日期：${startDate || '____年__月__日'}</div>
                </div>
            `;
            htmlStr += createFullPage(coverContent);

            /* ==========================================
               第2頁：航班&酒店檔案
            ========================================== */
            let hotelsListHtml = '';
            for (let h = 1; h <= hotelCount; h++) {
                hotelsListHtml += `
                    <div style="margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #CCCCCC; font-size: 10pt;">
                        <div style="font-weight: bold; font-size: 11pt; margin-bottom: 3px; color: #2c3e50;">🏨 住宿資料 ${h}</div>
                        <div style="line-height: 1.6;">
                            酒店名稱：<span class="ul-line" style="width: 65%;"></span><br>
                            酒店地址：<span class="ul-line" style="width: 40%;"></span> ／ 電話：<span class="ul-line" style="width: 20%;"></span><br>
                            包唔包早餐：□ 包 ＆nbsp;＆nbsp; □ 唔包 ＆nbsp;＆nbsp;／＆nbsp; Check-out時間：<span class="ul-line" style="width: 25%;"></span><br>
                            免費取消期限：<span class="ul-line" style="width: 35%;"></span> ／ 幾多晚：<span class="ul-line" style="width: 15%;"></span><br>
                            價錢：<span class="ul-line" style="width: 30%;"></span> ／ 免費泊車：□ 有 ＆nbsp;＆nbsp; □ 無<br>
                            預訂編號：<span class="ul-line" style="width: 65%;"></span>
                        </div>
                    </div>
                `;
            }

            const flightAndHotelContent = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px;">Flight & Hotel 檔案</div>
                <div class="layout-table" style="margin-top: 15px;">
                    <div class="layout-cell" style="width: 48%; padding-right: 3%;">
                        <div class="title-sub" style="margin-top:0;">✈️ 出發航班</div>
                        <div style="line-height: 1.7; font-size: 10.5pt;">
                            航班編號：<span class="ul-line" style="width:65%;"></span><br>
                            出發時間：<span class="ul-line" style="width:65%;"></span><br>
                            到達時間：<span class="ul-line" style="width:65%;"></span><br>
                            Terminal：<span class="ul-line" style="width:65%;"></span><br>
                            座位：  <span class="ul-line" style="width:65%;"></span><br>
                            機票價錢：<span class="ul-line" style="width:65%;"></span>
                        </div>
                        
                        <div class="title-sub" style="margin-top: 25px;">✈️ 回程航班</div>
                        <div style="line-height: 1.7; font-size: 10.5pt;">
                            航班編號：<span class="ul-line" style="width:65%;"></span><br>
                            出發時間：<span class="ul-line" style="width:65%;"></span><br>
                            到達時間：<span class="ul-line" style="width:65%;"></span><br>
                            Terminal：<span class="ul-line" style="width:65%;"></span><br>
                            座位：  <span class="ul-line" style="width:65%;"></span><br>
                            機票價錢：<span class="ul-line" style="width:65%;"></span>
                        </div>
                    </div>
                    
                    <div class="layout-cell" style="width: 52%; border-left: 1px dashed #CCCCCC; padding-left: 4%; max-height: 230mm; overflow: hidden;">
                        ${hotelsListHtml}
                    </div>
                </div>
            `;
            htmlStr += createFullPage(flightAndHotelContent);

            /* ==========================================
               第3頁：緊急聯絡&保險
            ========================================== */
            const emergencyContent = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px;">緊急聯絡 & 保險檔案</div>
                <div style="margin-top: 20px;">
                    <div class="title-sub">🚨 當地求助及保險資訊</div>
                    <p class="text-normal">當地緊急求助電話：<span class="ul-line" style="width:60%;"></span></p>
                    <p class="text-normal">旅遊保險緊急熱線：<span class="ul-line" style="width:60%;"></span></p>
                    <p class="text-normal">保險保單編號：  <span class="ul-line" style="width:60%;"></span></p>
                </div>
                <div style="margin-top: 40px;">
                    <div class="title-sub">👥 緊急通知聯絡人 (親友/同行人)</div>
                    <table class="data-table">
                        <tr>
                            <td>聯絡人：<span class="ul-line" style="width:50%;"></span><br><br>電話：<span class="ul-line" style="width:60%;"></span></td>
                            <td>聯絡人：<span class="ul-line" style="width:50%;"></span><br><br>電話：<span class="ul-line" style="width:60%;"></span></td>
                            <td>聯絡人：<span class="ul-line" style="width:50%;"></span><br><br>電話：<span class="ul-line" style="width:60%;"></span></td>
                        </tr>
                        <tr>
                            <td>聯絡人：<span class="ul-line" style="width:50%;"></span><br><br>電話：<span class="ul-line" style="width:60%;"></span></td>
                            <td>聯絡人：<span class="ul-line" style="width:50%;"></span><br><br>電話：<span class="ul-line" style="width:60%;"></span></td>
                            <td>聯絡人：<span class="ul-line" style="width:50%;"></span><br><br>電話：<span class="ul-line" style="width:60%;"></span></td>
                        </tr>
                    </table>
                </div>
            `;
            htmlStr += createFullPage(emergencyContent);

            /* ==========================================
               第4頁：總行程一覽
            ========================================== */
            let overviewRows = '';
            for (let i = 1; i <= totalDays; i++) {
                const dayDetails = getDayDetails(startDate, i - 1);
                const cityVal = document.getElementById(`city-day-${i}`).value || '自由行';
                overviewRows += `
                    <tr>
                        <td><strong>Day ${i}</strong><br><span style="font-size:10pt; color:#555;">${dayDetails.dateStr}</span></td>
                        <td>${cityVal}</td>
                        <td><span class="ul-line" style="width:95%;"></span></td>
                    </tr>
                `;
            }
            const overviewContent = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px;">總行程一覽 Overview</div>
                <table class="data-table" style="margin-top: 20px;">
                    <thead>
                        <tr>
                            <th style="width: 25%;">日期</th>
                            <th style="width: 40%;">主打城市 / 地區</th>
                            <th style="width: 35%;">今晚住邊間酒店</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${overviewRows}
                    </tbody>
                </table>
            `;
            htmlStr += createFullPage(overviewContent);

            /* ==========================================
               每日行程頁（每日3頁，自動重複）
            ========================================== */
            for (let i = 1; i <= totalDays; i++) {
                const dayDetails = getDayDetails(startDate, i - 1);
                const cityVal = document.getElementById(`city-day-${i}`).value || '自由行';

                // ▶ 每日第1頁（早上頁）
                const morningTimeline = generateTimelineHtml(6, 12);
                const morningContent = `
                    <div class="layout-table" style="border-bottom: 2px solid #333; padding-bottom: 10px;">
                        <div class="layout-cell" style="vertical-align: middle;">
                            <div class="title-main" style="margin:0; line-height:1.4;">Day ${i} ｜ ${cityVal} ｜ ${dayDetails.dateStr}<br>${dayDetails.weekStr}</div>
                        </div>
                        <div class="layout-cell header-right-meta" style="width: 180px; vertical-align: middle;">
                            <div class="weather-icons">☀️☁️🌧️</div><br>
                            起床：<span class="ul-line" style="min-width:40px;"></span>:<span class="ul-line" style="min-width:40px;"></span><br>
                            出門：<span class="ul-line" style="min-width:40px;"></span>:<span class="ul-line" style="min-width:40px;"></span>
                        </div>
                    </div>
                    
                    <div class="title-sub" style="margin-top: 20px;">🌅 今日朝早行程</div>
                    ${morningTimeline}
                    
                    <div class="title-sub" style="margin-top: 25px;">🍳 早餐食咩</div>
                    <table class="data-table" style="margin-top: 10px;">
                        <thead>
                            <tr>
                                <th style="width: 45%;">食物名稱</th>
                                <th style="width: 20%;">價錢</th>
                                <th style="width: 35%;">備註</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td style="height:35px;"></td><td></td><td></td></tr>
