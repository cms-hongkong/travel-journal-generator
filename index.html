<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行手帳PDF生成器</title>
    <style>
        /* 全網頁字型統一採用圓體風格 */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', 'PingFang SC', 'Segoe UI', sans-serif;
            background-color: #f3f4f6;
            color: #333333;
        }

        /* 網頁後台操作界面樣式 */
        .admin-box {
            max-width: 850px;
            margin: 40px auto;
            padding: 35px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        h1.ui-heading {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24pt;
            font-weight: bold;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group.full {
            grid-column: span 2;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 11pt;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 11pt;
            font-family: inherit;
        }

        .slider-flex {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #3498db;
        }

        .slider-indicator {
            font-weight: bold;
            color: #3498db;
            font-size: 12pt;
            min-width: 45px;
            text-align: right;
        }

        .dynamic-title {
            margin-top: 25px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
            color: #2c3e50;
            font-weight: bold;
            font-size: 13pt;
        }

        .city-box-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .city-box-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fafafa;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        .city-box-item span {
            font-weight: bold;
            color: #7f8c8d;
            min-width: 60px;
        }

        .btn-submit-print {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #2ecc71;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14pt;
            font-weight: bold;
            cursor: pointer;
            margin-top: 35px;
            transition: background-color 0.2s;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }

        .btn-submit-print:hover {
            background-color: #27ae60;
        }

        /* PDF 列印區域預設隱藏 */
        #pdf-print-area {
            display: none;
        }

        /* ------------------------------------------
           PDF 列印專用樣式規格 (A4 直向)
        ------------------------------------------ */
        @media print {
            .admin-box {
                display: none !important;
            }

            #pdf-print-area {
                display: block !important;
            }

            body {
                background-color: #ffffff;
            }

            @page {
                size: A4 portrait;
                margin: 0;
            }

            .pdf-page {
                width: 210mm;
                height: 296.8mm;
                page-break-after: always;
                position: relative;
                background-color: #ffffff;
                padding: 22mm 18mm 20mm 18mm;
                overflow: hidden;
                box-sizing: border-box;
            }

            .blank-page {
                width: 210mm;
                height: 296.8mm;
                page-break-after: always;
                background-color: #ffffff;
                box-sizing: border-box;
            }

            .pdf-page:last-child, .blank-page:last-child {
                page-break-after: avoid !important;
            }

            /* 可手寫底線 */
            .ul-line {
                border-bottom: 1px solid #000000;
                display: inline-block;
                min-width: 110mm;
                height: 24px;
                vertical-align: bottom;
            }

            .short-line {
                min-width: 45mm;
            }

            /* 頁尾資訊與連續頁碼 */
            .page-number {
                position: absolute;
                bottom: 12mm;
                left: 0;
                right: 0;
                text-align: center;
                font-size: 10pt;
                color: #888888;
            }

            .footer-left {
                position: absolute;
                bottom: 12mm;
                left: 18mm;
                font-size: 10pt;
                color: #888888;
            }

            .footer-right {
                position: absolute;
                bottom: 12mm;
                right: 18mm;
                font-size: 10pt;
                color: #888888;
                text-align: right;
            }

            /* 排版表格 */
            .layout-table {
                display: table;
                width: 100%;
                table-layout: fixed;
            }

            .layout-cell {
                display: table-cell;
                vertical-align: top;
            }

            /* 明細記錄表格 */
            .data-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 8px;
                margin-bottom: 12px;
            }

            .data-table th, .data-table td {
                border: 1px solid #CCCCCC;
                padding: 6px 8px;
                text-align: left;
                vertical-align: middle;
                font-size: 11pt;
            }

            .data-table th {
                background-color: #fdfdfd;
                font-weight: bold;
                font-size: 11.5pt;
            }

            /* 字體尺寸 */
            .title-large { font-size: 56pt; font-weight: bold; }
            .title-main { font-size: 16pt; font-weight: bold; }
            .title-sub { font-size: 14pt; font-weight: bold; color: #000000; margin-top: 15px; margin-bottom: 8px; }
            .text-normal { font-size: 12pt; }

            /* 航班與住宿特別雙倍行距 */
            .line-height-double p {
                line-height: 2.0 !important;
                margin: 5px 0;
            }

            /* 封面佈局 */
            .cover-container {
                text-align: center;
                height: 100%;
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            /* 每日行程時間軸 */
            .timeline-box {
                margin-top: 10px;
                margin-bottom: 15px;
            }
            .timeline-row {
                display: table;
                width: 100%;
                margin-bottom: 10px;
            }
            .timeline-time {
                display: table-cell;
                width: 65px;
                font-weight: bold;
                font-size: 12pt;
                color: #333333;
                vertical-align: bottom;
            }
            .timeline-fill-line {
                display: table-cell;
                border-bottom: 1px solid #000000;
                height: 22px;
            }

            /* 天氣狀態欄 */
            .header-meta-right {
                text-align: right;
                font-size: 12pt;
                line-height: 1.6;
            }
            .weather-box {
                font-size: 13pt;
                letter-spacing: 6px;
                border: 1px dashed #CCCCCC;
                padding: 2px 6px;
                border-radius: 4px;
                display: inline-block;
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1 class="ui-heading">✈️ 旅行手帳 PDF 生成器</h1>
        
        <div class="input-grid">
            <div class="input-group full">
                <label for="trip-name">旅程名稱</label>
                <input type="text" id="trip-name" placeholder="例如：2026 東京之旅 / 2026 曼谷遊" value="東京春櫻漫遊 2026">
            </div>

            <div class="input-group">
                <label for="start-date">出發日期</label>
                <input type="date" id="start-date">
            </div>

            <div class="input-group">
                <label for="currency">貨幣符號</label>
                <input type="text" id="currency" placeholder="例如：¥ / ฿ / € / $" value="¥">
            </div>

            <div class="input-group">
                <label for="trip-days">旅行日數 (1 - 30 日)</label>
                <div class="slider-flex">
                    <input type="range" id="trip-days" min="1" max="30" value="5" oninput="updateDaysLabel(this.value)">
                    <span id="days-val" class="slider-indicator">5 日</span>
                </div>
            </div>

            <div class="input-group">
                <label for="hotel-count">住宿數量 (1 - 10 間)</label>
                <div class="slider-flex">
                    <input type="range" id="hotel-count" min="1" max="10" value="3" oninput="updateHotelsLabel(this.value)">
                    <span id="hotel-val" class="slider-indicator">3 間</span>
                </div>
            </div>
        </div>

        <div class="dynamic-title">每日主打城市／地區設定</div>
        <div id="city-inputs-container" class="city-box-grid">
            </div>

        <button type="button" class="btn-submit-print" onclick="generateJournalPDF()">✨ 生成手帳 PDF</button>
    </div>

    <div id="pdf-print-area"></div>

    <script>
        // 設定今日為預設出發日期
        document.getElementById('start-date').valueAsDate = new Date();

        function updateDaysLabel(val) {
            document.getElementById('days-val').innerText = val + ' 日';
            renderCityInputs(parseInt(val));
        }

        function updateHotelsLabel(val) {
            document.getElementById('hotel-val').innerText = val + ' 間';
        }

        function renderCityInputs(days) {
            const container = document.getElementById('city-inputs-container');
            container.innerHTML = '';
            const defaults = ["東京", "河口湖", "箱根", "鐮倉", "橫濱"];
            for (let i = 1; i <= days; i++) {
                const city = defaults[(i - 1) % defaults.length];
                const div = document.createElement('div');
                div.className = 'city-box-item';
                div.innerHTML = `<span>Day ${i} :</span><input type="text" id="city-day-${i}" value="${city}">`;
                container.appendChild(div);
            }
        }
        renderCityInputs(5);

        // 簡約輕量風格線條 SVG 圖案庫
        const svgLib = [
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l8 2.5z"/></svg>`, // 飛機
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`, // 地球
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M16 7V4a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3M3 12h18M9 12v8m6-8v8"/></svg>`, // 行李箱
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`, // 相機
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><path d="M2 17l3-6h14l3 6H2zM12 2v9M12 5h5M7 11V8h3"/></svg>`, // 船
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><rect x="4" y="3" width="16" height="15" rx="2"/><circle cx="8" cy="14" r="1"/><circle cx="16" cy="14" r="1"/><path d="M2 21h20M5 9h14M9 3v6m6-6v6"/></svg>`, // 火車
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>` // 指南針
        ];

        // 每頁隨機四角分發 2-3 個細線圖案
        function getCornerDecorations() {
            const count = Math.random() > 0.5 ? 3 : 2;
            const shuffled = [...svgLib].sort(() => 0.5 - Math.random());
            const picked = shuffled.slice(0, count);
            const positions = [
                "top: 5mm; left: 5mm;", "top: 5mm; right: 5mm;",
                "bottom: 18mm; left: 5mm;", "bottom: 18mm; right: 5mm;"
            ].sort(() => 0.5 - Math.random());
            
            let html = '';
            for(let i = 0; i < count; i++) {
                html += `<div style="position: absolute; ${positions[i]} color: #D0D0D0; z-index: 10;">${picked[i]}</div>`;
            }
            return html;
        }

        // 計算偏移日期與星期
        function getOffsetDateStr(baseDateStr, offset) {
            if (!baseDateStr) return '____-__-__';
            const d = new Date(baseDateStr);
            d.setDate(d.getDate() + offset);
            const yy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yy}-${mm}-${dd}`;
        }

        // 構造時間軸
        function buildTimelineBlock(start, end) {
            let html = '<div class="timeline-box">';
            for(let h = start; h <= end; h++) {
                html += `<div class="timeline-row"><div class="timeline-time">${String(h).padStart(2, '0')}:00</div><div class="timeline-fill-line"></div></div>`;
            }
            html += '</div>';
            return html;
        }

        // 生成帶有 8 行空格的日記明細表格
        function buildDiaryTable(th1, th2, th3) {
            let rows = '';
            for(let r = 0; r < 8; r++) {
                rows += `<tr><td style="height: 30px;"></td><td></td><td></td></tr>`;
            }
            return `
                <table class="data-table">
                    <thead><tr><th style="width: 45%;">${th1}</th><th style="width: 20%;">${th2}</th><th style="width: 35%;">${th3}</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function generateJournalPDF() {
            const tripName = document.getElementById('trip-name').value || '隨心手帳';
            const startDate = document.getElementById('start-date').value;
            const currency = document.getElementById('currency').value || '$';
            const tripDays = parseInt(document.getElementById('trip-days').value);
            const hotelCount = parseInt(document.getElementById('hotel-count').value);

            // 精確推算內容總頁數 (空白雙數頁面不計入頁碼分母)
            const coverPages = 1;
            const flightPages = 1;
            const hotelPages = Math.ceil(hotelCount / 2);
            const overviewPages = Math.ceil(tripDays / 14);
            const diaryPages = tripDays * 3;
            const expensePages = 1;
            const backPages = 2;
            const totalContentPages = coverPages + flightPages + hotelPages + overviewPages + diaryPages + expensePages + backPages;

            let currentPageIndex = 1;
            let outputHTML = '';

            // 結構包裹處理常式：自動產生有頁碼的內容頁，並在需要時緊接一頁零裝飾、零文字的純白紙頁
            function renderPage(innerMarkup, isDiaryPage = false) {
                const decors = getCornerDecorations();
                const footers = `
                    <div class="footer-left">cms.hongkong-travel.journal.generator</div>
                    <div class="page-number">${currentPageIndex} / ${totalContentPages}</div>
                    <div class="footer-right">${tripName}</div>
                `;
                currentPageIndex++;

                let result = `<div class="pdf-page">${decors}${innerMarkup}${footers}</div>`;
                if (isDiaryPage) {
                    result += `<div class="blank-page"></div>`; // 緊接全空白頁
                }
                return result;
            }

            /* ==========================================
               第1頁：封面頁
            ========================================== */
            const coverIcons = [...svgLib].sort(() => 0.5 - Math.random()).slice(0, 6);
            const coverHtml = `
                <div class="cover-container">
                    <div style="position: absolute; top: 20%; left: 25%; color: #C0C0C0;">${coverIcons[0]}</div>
                    <div style="position: absolute; top: 20%; right: 25%; color: #C0C0C0;">${coverIcons[1]}</div>
                    <div style="position: absolute; top: 50%; left: 10%; color: #C0C0C0;">${coverIcons[2]}</div>
                    <div style="position: absolute; top: 50%; right: 10%; color: #C0C0C0;">${coverIcons[3]}</div>
                    <div style="position: absolute; bottom: 20%; left: 25%; color: #C0C0C0;">${coverIcons[4]}</div>
                    <div style="position: absolute; bottom: 20%; right: 25%; color: #C0C0C0;">${coverIcons[5]}</div>
                    
                    <div class="title-large" style="max-width: 85%; word-break: break-word; line-height: 1.3;">${tripName}</div>
                </div>
            `;
            outputHTML += renderPage(coverHtml, false);

            /* ==========================================
               第2頁：航班資料
            ========================================== */
            const outDate = startDate ? startDate : '____-__-__';
            const retDate = getOffsetDateStr(startDate, tripDays - 1);
            const flightHtml = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 20px;">航班資料 Flight Profile</div>
                <div class="line-height-double" style="margin-top: 15px;">
                    <div class="title-sub">出發航班 ✈️</div>
                    <p class="text-normal">出發日期：${outDate}</p>
                    <p class="text-normal">航班編號：<span class="ul-line"></span></p>
                    <p class="text-normal">出發時間：<span class="ul-line short-line"></span> ／ 到達時間：<span class="ul-line short-line"></span></p>
                    <p class="text-normal">Terminal：<span class="ul-line short-line"></span> ／ 座位：<span class="ul-line short-line"></span></p>
                    <p class="text-normal">機票價錢：<span class="ul-line"></span></p>
                </div>
                <div class="line-height-double" style="margin-top: 35px;">
                    <div class="title-sub">回程航班 ✈️</div>
                    <p class="text-normal">回程日期：${retDate}</p>
                    <p class="text-normal">航班編號：<span class="ul-line"></span></p>
                    <p class="text-normal">出發時間：<span class="ul-line short-line"></span> ／ 到達時間：<span class="ul-line short-line"></span></p>
                    <p class="text-normal">Terminal：<span class="ul-line short-line"></span> ／ 座位：<span class="ul-line short-line"></span></p>
                    <p class="text-normal">機票價錢：<span class="ul-line"></span></p>
                </div>
            `;
            outputHTML += renderPage(flightHtml, false);

            /* ==========================================
               第3頁起：住宿資料 (每頁顯示2間)
            ========================================== */
            for (let k = 0; k < hotelPages; k++) {
                let pageHotelsMarkup = `<div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 15px;">住宿資料 Accommodation</div><div class="line-height-double">`;
                
                for (let h = 1; h <= 2; h++) {
                    const hotelIdx = (k * 2) + h;
                    if (hotelIdx <= hotelCount) {
                        pageHotelsMarkup += `
                            <div style="margin-bottom: 20px; padding-bottom: 10px; ${h===1 && hotelIdx<hotelCount ? 'border-bottom: 1px dashed #cccccc;' : ''}">
                                <div class="title-sub" style="margin-top: 0; color: #2c3e50;">酒店 ${hotelIdx}</div>
                                <p class="text-normal">酒店名：<span class="ul-line"></span></p>
                                <p class="text-normal">地址：<span class="ul-line"></span></p>
                                <p class="text-normal">電話：<span class="ul-line"></span></p>
                                <p class="text-normal">Check-in時間：<span class="ul-line short-line"></span> ／ Check-out時間：<span class="ul-line short-line"></span></p>
                                <p class="text-normal">包早餐（□包 □唔包）</p>
                                <p class="text-normal">免費取消期限：<span class="ul-line short-line"></span> ／ 幾多晚：<span class="ul-line short-line"></span></p>
                                <p class="text-normal">價錢：<span class="ul-line short-line"></span> ／ 免費泊車（□有 □無）</p>
                                <p class="text-normal">預訂編號：<span class="ul-line"></span></p>
                            </div>
                        `;
                    }
                }
                pageHotelsMarkup += `</div>`;
                outputHTML += renderPage(pageHotelsMarkup, false);
            }

            /* ==========================================
               總行程一覽頁 (每頁最多顯示14日)
            ========================================== */
            for (let g = 0; g < overviewPages; g++) {
                let rowsHtml = '';
                const startDayIdx = (g * 14) + 1;
                const endDayIdx = Math.min(startDayIdx + 13, tripDays);

                for (let i = startDayIdx; i <= endDayIdx; i++) {
                    const dateString = getOffsetDateStr(startDate, i - 1);
                    const currentCity = document.getElementById(`city-day-${i}`).value || '自由行';
                    rowsHtml += `
                        <tr>
                            <td style="height: 42px;"><strong>Day ${i}</strong><br><span style="font-size:9.5pt; color:#666;">${dateString}</span></td>
                            <td><strong>${currentCity}</strong></td>
                            <td></td>
                        </tr>
                    `;
                }

                const overviewHtml = `
                    <div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 20px;">總行程一覽 Overview</div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 30%;">日期</th>
                                <th style="width: 35%;">主打城市 / 地區</th>
                                <th style="width: 35%;">今晚住邊間酒店</th>
                            </tr>
                        </thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                `;
                outputHTML += renderPage(overviewHtml, false);
            }

            /* ==========================================
               每日行程頁（每日3頁，自動重複）
            ========================================== */
            for (let i = 1; i <= tripDays; i++) {
                const dateString = getOffsetDateStr(startDate, i - 1);
                const currentCity = document.getElementById(`city-day-${i}`).value || '自由行';
                const headerTitle = `Day ${i} ｜ ${currentCity} ｜ ${dateString}`;

                // ▶ 每日第1頁（早上頁：06:00 - 12:00）
                const morningHtml = `
                    <div class="layout-table" style="border-bottom: 2px solid #333333; padding-bottom: 6px; margin-bottom: 12px;">
                        <div class="layout-cell" style="vertical-align: bottom;"><div class="title-main">${headerTitle}</div></div>
                        <div class="layout-cell header-meta-right" style="width: 180px;">
                            <div class="weather-box">☀️ ☁️ 🌧️</div><br>
                            起床：<span class="ul-line" style="min-width:30px; height:18px;"></span>:<span class="ul-line" style="min-width:30px; height:18px;"></span><br>
                            出門：<span class="ul-line" style="min-width:30px; height:18px;"></span>:<span class="ul-line" style="min-width:30px; height:18px;"></span>
                        </div>
                    </div>
                    <div class="title-sub" style="margin-top: 5px; font-size: 11pt;">🌅 朝早行程時間軸 (06:00 - 12:00)</div>
                    ${buildTimelineBlock(6, 12)}
                    <div class="title-sub" style="font-size: 11pt;">🍳 食咗咩</div>
                    ${buildDiaryTable("食物名稱", "價錢", "備註／餐廳名")}
                    <div class="title-sub" style="font-size: 11pt;">🛍️ 買咗咩</div>
                    ${buildDiaryTable("物品名稱", "價錢", "購買地點")}
                `;
                outputHTML += renderPage(morningHtml, true);

                // ▶ 每日第2頁（中午至下午頁：12:00 - 18:00）
                const afternoonHtml = `
                    <div class="layout-table" style="border-bottom: 2px solid #333333; padding-bottom: 6px; margin-bottom: 12px;">
                        <div class="layout-cell" style="vertical-align: bottom;"><div class="title-main">${headerTitle}</div></div>
                        <div class="layout-cell header-meta-right" style="width: 100px;"><div class="weather-box">☀️ ☁️ 🌧️</div></div>
                    </div>
                    <div class="title-sub" style="margin-top: 5px; font-size: 11pt;">☀️ 下午行程時間軸 (12:00 - 18:00)</div>
                    ${buildTimelineBlock(12, 18)}
                    <div class="title-sub" style="font-size: 11pt;">🍱 食咗咩</div>
                    ${buildDiaryTable("食物名稱", "價錢", "備註／餐廳名")}
                    <div class="title-sub" style="font-size: 11pt;">🛍️ 買咗咩</div>
                    ${buildDiaryTable("物品名稱", "價錢", "購買地點")}
                `;
                outputHTML += renderPage(afternoonHtml, true);

                // ▶ 每日第3頁（晚上頁：18:00 - 23:00）
                const eveningHtml = `
                    <div class="layout-table" style="border-bottom: 2px solid #333333; padding-bottom: 6px; margin-bottom: 12px;">
                        <div class="layout-cell" style="vertical-align: bottom;"><div class="title-main">${headerTitle}</div></div>
                        <div class="layout-cell header-meta-right" style="width: 100px;"><div class="weather-box">☀️ ☁️ 🌧️</div></div>
                    </div>
                    <div class="title-sub" style="margin-top: 5px; font-size: 11pt;">🌙 晚上行程時間軸 (18:00 - 23:00)</div>
                    ${buildTimelineBlock(18, 23)}
                    <div class="title-sub" style="font-size: 11pt;">🌌 食咗咩</div>
                    ${buildDiaryTable("食物名稱", "價錢", "備註／餐廳名")}
                    <div class="title-sub" style="font-size: 11pt;">🛍️ 買咗咩</div>
                    ${buildDiaryTable("物品名稱", "價錢", "購買地點")}
                `;
                outputHTML += renderPage(eveningHtml, true);
            }

            /* ==========================================
               全日支出總結頁（獨立一頁）
            ========================================== */
            let expenseRows = '';
            for (let i = 1; i <= tripDays; i++) {
                expenseRows += `
                    <tr>
                        <td style="height: 38px; text-align: center;"><strong>Day ${i}</strong></td>
                        <td><span class="ul-line" style="min-width: 25mm; height:18px;"></span></td>
                        <td>${currency} <span class="ul-line" style="min-width: 20mm; height:18px;"></span></td>
                        <td>${currency} <span class="ul-line" style="min-width: 20mm; height:18px;"></span></td>
                        <td>${currency} <span class="ul-line" style="min-width: 20mm; height:18px;"></span></td>
                        <td>${currency} <span class="ul-line" style="min-width: 25mm; height:18px; border-bottom-width:2px;"></span></td>
                    </tr>
                `;
            }

            const expenseHtml = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 20px;">全日支出總結 Expense Summary</div>
                <table class="data-table" style="margin-top: 15px;">
                    <thead>
                        <tr>
                            <th style="width: 15%; text-align: center;">天數</th>
                            <th style="width: 20%;">日期 (手寫)</th>
                            <th style="width: 16%;">交通</th>
                            <th style="width: 16%;">飲食</th>
                            <th style="width: 16%;">購物</th>
                            <th style="width: 17%;">雜項</th>
                            <th style="width: 18%; background-color:#f5f5f5;">合計</th>
                        </tr>
                    </thead>
                    <tbody>${expenseRows}</tbody>
                </table>
                <div style="margin-top: 40px; text-align: right; padding-right: 5mm;">
                    <span class="title-main" style="font-size: 15pt;">總使費： ${currency} ___________________________</span>
                </div>
            `;
            outputHTML += renderPage(expenseHtml, false);

            /* ==========================================
               後置頁面：單據收納頁 ＆ 地圖貼貼頁 (最後2頁)
            ========================================== */
            outputHTML += renderPage('<div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px;">單據收納頁 Receipts</div>', false);
            outputHTML += renderPage('<div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px;">地圖 ／ 單張貼貼頁 Maps & Mementos</div>', false);

            // 寫入DOM結構並喚起列印視窗
            document.getElementById('pdf-print-area').innerHTML = outputHTML;
            window.print();
        }
    </script>
</body>
</html>
