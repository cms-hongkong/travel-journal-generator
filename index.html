<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行手帳PDF生成器</title>
    <style>
        /* 全網頁字型與基礎設定 */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', 'PingFang SC', 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            color: #333333;
        }

        /* 網頁操作界面樣式 */
        .admin-panel {
            max-width: 850px;
            margin: 40px auto;
            padding: 35px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        h1.panel-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24pt;
            font-weight: bold;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 11pt;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 11pt;
            font-family: inherit;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8fafc;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #3498db;
        }

        .slider-value {
            font-weight: bold;
            color: #3498db;
            font-size: 12pt;
            min-width: 45px;
            text-align: right;
        }

        .section-label {
            margin-top: 25px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
            color: #2c3e50;
            font-weight: bold;
            font-size: 13pt;
        }

        .city-inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .city-input-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fafafa;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        .city-input-item span {
            font-weight: bold;
            color: #7f8c8d;
            min-width: 60px;
        }

        .btn-generate-pdf {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #2ecc71;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14pt;
            font-weight: bold;
            cursor: pointer;
            margin-top: 35px;
            transition: background-color 0.2s;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }

        .btn-generate-pdf:hover {
            background-color: #27ae60;
        }

        /* PDF 預覽與列印主體預設隱藏 */
        #pdf-render-zone {
            display: none;
        }

        /* ------------------------------------------
           PDF 列印專用樣式規格 (A4 直向)
        ------------------------------------------ */
        @media print {
            .admin-panel {
                display: none !important;
            }

            #pdf-render-zone {
                display: block !important;
            }

            body {
                background-color: #ffffff;
            }

            @page {
                size: A4 portrait;
                margin: 0;
            }

            .pdf-page {
                width: 210mm;
                height: 296.8mm;
                page-break-after: always;
                position: relative;
                background-color: #ffffff;
                padding: 22mm 18mm 20mm 18mm;
                overflow: hidden;
                box-sizing: border-box;
            }

            .blank-page {
                width: 210mm;
                height: 296.8mm;
                page-break-after: always;
                position: relative;
                background-color: #ffffff;
                box-sizing: border-box;
            }

            .pdf-page:last-child, .blank-page:last-child {
                page-break-after: avoid !important;
            }

            /* 手寫底橫線 */
            .ul-line {
                border-bottom: 1px solid #000000;
                display: inline-block;
                min-width: 110mm;
                height: 24px;
                vertical-align: bottom;
            }

            .short-line {
                min-width: 45mm;
            }

            /* 頁尾位置設定 */
            .page-number {
                position: absolute;
                bottom: 12mm;
                left: 0;
                right: 0;
                text-align: center;
                font-size: 10pt;
                color: #888888;
            }

            .footer-left {
                position: absolute;
                bottom: 12mm;
                left: 18mm;
                font-size: 10pt;
                color: #888888;
            }

            .footer-right {
                position: absolute;
                bottom: 12mm;
                right: 18mm;
                font-size: 10pt;
                color: #888888;
                text-align: right;
            }

            /* 排版結構 */
            .layout-columns {
                display: table;
                width: 100%;
                table-layout: fixed;
            }

            .layout-column {
                display: table-cell;
                vertical-align: top;
            }

            /* 手寫專用格線表格 */
            .data-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 6px;
                margin-bottom: 10px;
            }

            .data-table th, .data-table td {
                border: 1px solid #CCCCCC;
                padding: 5px 8px;
                text-align: left;
                vertical-align: middle;
                font-size: 10.5pt;
            }

            .data-table th {
                background-color: #fafafa;
                font-weight: bold;
                font-size: 11pt;
            }

            /* 字體規範 */
            .title-large { font-size: 56pt; font-weight: bold; }
            .title-main { font-size: 16pt; font-weight: bold; }
            .title-sub { font-size: 14pt; font-weight: bold; color: #000000; margin-top: 15px; margin-bottom: 8px; }
            .text-normal { font-size: 12pt; }

            /* 2倍超高行距調配 */
            .line-height-double p {
                line-height: 2.0 !important;
                margin: 4px 0;
            }

            /* 封面對齊排版 */
            .cover-center-box {
                text-align: center;
                height: 100%;
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            /* 時間軸行程 */
            .timeline-box {
                margin-top: 8px;
                margin-bottom: 12px;
            }
            .timeline-row {
                display: table;
                width: 100%;
                margin-bottom: 8px;
            }
            .timeline-time {
                display: table-cell;
                width: 65px;
                font-weight: bold;
                font-size: 11.5pt;
                color: #333333;
                vertical-align: bottom;
            }
            .timeline-fill-line {
                display: table-cell;
                border-bottom: 1px solid #000000;
                height: 22px;
            }

            /* 天氣與頂部狀態 */
            .header-meta-right {
                text-align: right;
                font-size: 11.5pt;
                line-height: 1.6;
            }
            .weather-group-box {
                font-size: 12pt;
                letter-spacing: 6px;
                border: 1px dashed #CCCCCC;
                padding: 2px 6px;
                border-radius: 4px;
                display: inline-block;
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1 class="panel-title">✈️ 旅行手帳 PDF 生成器</h1>
        
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="trip-name">旅程名稱</label>
                <input type="text" id="trip-name" placeholder="例如：2026 東京之旅 / 2026 曼谷遊" value="首爾出走記 2026">
            </div>

            <div class="form-group">
                <label for="start-date">出發日期</label>
                <input type="date" id="start-date">
            </div>

            <div class="form-group">
                <label for="currency">貨幣符號</label>
                <input type="text" id="currency" placeholder="例如：¥ / ฿ / € / $" value="₩">
            </div>

            <div class="form-group">
                <label for="trip-days">旅行日數 (1 - 30 日)</label>
                <div class="slider-wrapper">
                    <input type="range" id="trip-days" min="1" max="30" value="5" oninput="updateDaysLabel(this.value)">
                    <span id="days-val" class="slider-value">5 日</span>
                </div>
            </div>

            <div class="form-group">
                <label for="hotel-count">住宿數量 (1 - 10 間)</label>
                <div class="slider-wrapper">
                    <input type="range" id="hotel-count" min="1" max="10" value="2" oninput="updateHotelsLabel(this.value)">
                    <span id="hotel-val" class="slider-value">2 間</span>
                </div>
            </div>
        </div>

        <div class="section-label">每日主打城市／地區設定</div>
        <div id="city-inputs-container" class="city-inputs-grid">
            </div>

        <button type="button" class="btn-generate-pdf" onclick="buildJournalPDF()">✨ 生成手帳 PDF</button>
    </div>

    <div id="pdf-render-zone"></div>

    <script>
        // 設定今日為預設出發日期
        document.getElementById('start-date').valueAsDate = new Date();

        function updateDaysLabel(val) {
            document.getElementById('days-val').innerText = val + ' 日';
            renderCityInputs(parseInt(val));
        }

        function updateHotelsLabel(val) {
            document.getElementById('hotel-val').innerText = val + ' 間';
        }

        function renderCityInputs(days) {
            const container = document.getElementById('city-inputs-container');
            container.innerHTML = '';
            const defaults = ["首爾", "弘大", "明洞", "江南", "釜山"];
            for (let i = 1; i <= days; i++) {
                const city = defaults[(i - 1) % defaults.length];
                const div = document.createElement('div');
                div.className = 'city-input-item';
                div.innerHTML = `<span>Day ${i} :</span><input type="text" id="city-day-${i}" value="${city}">`;
                container.appendChild(div);
            }
        }
        renderCityInputs(5);

        // 簡約輕量風格線條 SVG 圖案庫
        const svgDecorations = [
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l8 2.5z"/></svg>`, // 飛機
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`, // 地球
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M16 7V4a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3M3 12h18M9 12v8m6-8v8"/></svg>`, // 行李箱
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`, // 相機
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><path d="M2 17l3-6h14l3 6H2zM12 2v9M12 5h5M7 11V8h3"/></svg>`, // 船
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><rect x="4" y="3" width="16" height="15" rx="2"/><circle cx="8" cy="14" r="1"/><circle cx="16" cy="14" r="1"/><path d="M2 21h20M5 9h14M9 3v6m6-6v6"/></svg>`, // 火車
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>` // 指南針
        ];

        // 每頁隨機於四角分發 2-3 款細線圖案
        function makePageDecorations() {
            const count = Math.random() > 0.5 ? 3 : 2;
            const shuffled = [...svgDecorations].sort(() => 0.5 - Math.random());
            const picked = shuffled.slice(0, count);
            const positions = [
                "top: 5mm; left: 5mm;", "top: 5mm; right: 5mm;",
                "bottom: 18mm; left: 5mm;", "bottom: 18mm; right: 5mm;"
            ].sort(() => 0.5 - Math.random());
            
            let html = '';
            for(let i = 0; i < count; i++) {
                html += `<div style="position: absolute; ${positions[i]} color: #D0D0D0; z-index: 10;">${picked[i]}</div>`;
            }
            return html;
        }

        // 精準計算推導日期與星期幾文字
        function getOffsetDateFullStr(baseDateStr, offset) {
            if (!baseDateStr) return { date: '____-__-__', week: '星期_' };
            const d = new Date(baseDateStr);
            d.setDate(d.getDate() + offset);
            const yy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            return {
                date: `${yy}-${mm}-${dd}`,
                week: weekDays[d.getDay()]
            };
        }

        // 建立時間軸結構
        function makeTimeline(start, end) {
            let html = '<div class="timeline-box">';
            for(let h = start; h <= end; h++) {
                html += `<div class="timeline-row"><div class="timeline-time">${String(h).padStart(2, '0')}:00</div><div class="timeline-fill-line"></div></div>`;
            }
            html += `<div class="timeline-row" style="margin-top:12px;"><div class="timeline-time" style="width:45px;">交通：</div><div class="timeline-fill-line"></div></div>`;
            html += '</div>';
            return html;
        }

        // 建立空白手寫表格
        function makeHandwriteTable(th1, th2, th3, rowsCount) {
            let rows = '';
            for(let r = 0; r < rowsCount; r++) {
                rows += `<tr><td style="height: 28px;"></td><td></td><td></td></tr>`;
            }
            return `
                <table class="data-table">
                    <thead><tr><th style="width: 45%;">${th1}</th><th style="width: 20%;">${th2}</th><th style="width: 35%;">${th3}</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function buildJournalPDF() {
            const tripName = document.getElementById('trip-name').value || '旅行手帳';
            const startDate = document.getElementById('start-date').value;
            const currency = document.getElementById('currency').value || '$';
            const tripDays = parseInt(document.getElementById('trip-days').value);
            const hotelCount = parseInt(document.getElementById('hotel-count').value);

            // 計算精確總面數 (依據規則：空白頁也要分配連續編號的頁碼)
            const coverPages = 1; // 封面頁
            const flightPages = 1;
            const hotelPages = Math.ceil(hotelCount / 2);
            const overviewPages = Math.ceil(tripDays / 14);
            const diaryPages = tripDays * 3 * 2; // 早午晚 (3頁內容 + 3頁空白) = 每日6頁
            const expensePages = Math.ceil(tripDays / 15);
            const postPages = 2; // 單據、地圖
            
            const totalNumberedPages = (coverPages + flightPages + hotelPages + overviewPages + diaryPages + expensePages + postPages) - 1;

            let currentPageNum = 1;
            let outputHTML = '';

            // 結構化封裝處理程序
            function printContentPage(innerMarkup, isDiaryPage = false) {
                const decors = makePageDecorations();
                
                // 封面頁（第1頁）不顯示任何頁首頁尾與頁碼
                if (currentPageNum === 1) {
                    currentPageNum++;
                    return `<div class="pdf-page">${innerMarkup}</div>`;
                }

                const displayedIndex = currentPageNum - 1;
                const footers = `
                    <div class="footer-left">cms.hongkong-travel.journal.generator</div>
                    <div class="page-number">${displayedIndex} / ${totalNumberedPages}</div>
                    <div class="footer-right">${tripName}</div>
                `;
                currentPageIndexForBlank = displayedIndex; 
                currentPageNum++;

                let pageMarkup = `<div class="pdf-page">${decors}${innerMarkup}${footers}</div>`;
                
                // 每一頁行程頁後面緊接插入一頁完全空白但包含頁碼的雙數頁
                if (isDiaryPage) {
                    const blankDisplayedIndex = currentPageNum - 1;
                    pageMarkup += `
                        <div class="blank-page">
                            <div class="page-number" style="bottom: 12mm; text-align: center; font-size: 10pt; color: #888888; left: 0; right: 0;">${blankDisplayedIndex} / ${totalNumberedPages}</div>
                        </div>
                    `;
                    currentPageNum++;
                }
                return pageMarkup;
            }

            /* ==========================================
               第1頁：封面頁
            ========================================== */
            const coverIcons = [...svgDecorations].sort(() => 0.5 - Math.random()).slice(0, 6);
            const coverHtml = `
                <div class="cover-center-box">
                    <div style="position: absolute; top: 22%; left: 24%; color: #C0C0C0;">${coverIcons[0]}</div>
                    <div style="position: absolute; top: 22%; right: 24%; color: #C0C0C0;">${coverIcons[1]}</div>
                    <div style="position: absolute; top: 50%; left: 8%; color: #C0C0C0;">${coverIcons[2]}</div>
                    <div style="position: absolute; top: 50%; right: 8%; color: #C0C0C0;">${coverIcons[3]}</div>
                    <div style="position: absolute; bottom: 22%; left: 24%; color: #C0C0C0;">${coverIcons[4]}</div>
                    <div style="position: absolute; bottom: 22%; right: 24%; color: #C0C0C0;">${coverIcons[5]}</div>
                    <div class="title-large" style="max-width: 85%; word-break: break-word; line-height: 1.35;">${tripName}</div>
                </div>
            `;
            outputHTML += printContentPage(coverHtml, false);

            /* ==========================================
               第2頁：航班資料 (頁碼標示 1/XX)
            ========================================== */
            const outboundObj = getOffsetDateFullStr(startDate, 0);
            const inboundObj = getOffsetDateFullStr(startDate, tripDays - 1);
            
            const flightHtml = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 20px;">航班資料 Flight Profile</div>
                <div class="line-height-double" style="margin-top: 20px;">
                    <div class="title-sub">出發航班 ✈️</div>
                    <p class="text-normal">出發日期：${outboundObj.date}（${outboundObj.week}）</p>
                    <p class="text-normal">航班編號：<span class="ul-line"></span></p>
                    <p class="text-normal">出發時間：<span class="ul-line short-line"></span> ／ 到達時間：<span class="ul-line short-line"></span></p>
                    <p class="text-normal">Terminal：<span class="ul-line short-line"></span> ／ 座位：<span class="ul-line short-line"></span></p>
                    <p class="text-normal">機票價錢：<span class="ul-line"></span></p>
                </div>
                <div class="line-height-double" style="margin-top: 40px;">
                    <div class="title-sub">回程航班 ✈️</div>
                    <p class="text-normal">回程日期：${inboundObj.date}（${inboundObj.week}）</p>
                    <p class="text-normal">航班編號：<span class="ul-line"></span></p>
                    <p class="text-normal">出發時間：<span class="ul-line short-line"></span> ／ 到達時間：<span class="ul-line short-line"></span></p>
                    <p class="text-normal">Terminal：<span class="ul-line short-line"></span> ／ 座位：<span class="ul-line short-line"></span></p>
                    <p class="text-normal">機票價錢：<span class="ul-line"></span></p>
                </div>
            `;
            outputHTML += printContentPage(flightHtml, false);

            /* ==========================================
               第3頁起：住宿資料 (每頁顯示2間)
            ========================================== */
            for (let k = 0; k < hotelPages; k++) {
                let hotelMarkup = `<div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 15px;">住宿資料 Accommodation</div><div class="line-height-double">`;
                for (let h = 1; h <= 2; h++) {
                    const hotelIdx = (k * 2) + h;
                    if (hotelIdx <= hotelCount) {
                        hotelMarkup += `
                            <div style="margin-bottom: 20px; padding-bottom: 10px; ${h === 1 && hotelIdx < hotelCount ? 'border-bottom: 1px dashed #cccccc;' : ''}">
                                <div class="title-sub" style="margin-top: 0; color: #2c3e50;">酒店 ${hotelIdx}</div>
                                <p class="text-normal">酒店名：<span class="ul-line"></span></p>
                                <p class="text-normal">地址：<span class="ul-line"></span></p>
                                <p class="text-normal">電話：<span class="ul-line"></span></p>
                                <p class="text-normal">Check-in時間：<span class="ul-line short-line"></span> ／ Check-out時間：<span class="ul-line short-line"></span></p>
                                <p class="text-normal">包早餐（□包  □唔包）</p>
                                <p class="text-normal">免費取消期限：<span class="ul-line short-line"></span> ／ 幾多晚：<span class="ul-line short-line"></span></p>
                                <p class="text-normal">價錢：<span class="ul-line short-line"></span> ／ 免費泊車（□有  □無）</p>
                                <p class="text-normal">預訂編號：<span class="ul-line"></span></p>
                            </div>
                        `;
                    }
                }
                hotelMarkup += `</div>`;
                outputHTML += printContentPage(hotelMarkup, false);
            }

            /* ==========================================
               總行程一覽頁 (每頁最多14天)
            ========================================== */
            for (let g = 0; g < overviewPages; g++) {
                let rows = '';
                const startDay = (g * 14) + 1;
                const endDay = Math.min(startDay + 13, tripDays);

                for (let i = startDay; i <= endDay; i++) {
                    const dayObj = getOffsetDateFullStr(startDate, i - 1);
                    const cityVal = document.getElementById(`city-day-${i}`).value || '自由行';
                    rows += `
                        <tr>
                            <td style="height: 40px; font-weight: bold;">Day ${i}<br><span style="font-size:9.5pt; color:#666; font-weight:normal;">${dayObj.date}（${dayObj.week}）</span></td>
                            <td><strong>${cityVal}</strong></td>
                            <td></td>
                        </tr>
                    `;
                }

                const overviewHtml = `
                    <div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 20px;">總行程一覽 Overview</div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 35%;">日期（星期X）</th>
                                <th style="width: 35%;">主打城市 / 地區</th>
                                <th style="width: 30%;">今晚住邊間酒店</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
                outputHTML += printContentPage(overviewHtml, false);
            }

            /* ==========================================
               每日行程頁 (包含空白頁交叉插入)
            ========================================== */
            for (let i = 1; i <= tripDays; i++) {
                const dayObj = getOffsetDateFullStr(startDate, i - 1);
                const cityVal = document.getElementById(`city-day-${i}`).value || '自由行';
                const headerTitle = `Day ${i} ｜ ${cityVal} ｜ ${dayObj.date}（${dayObj.week}）`;

                // ▶ 每日第1頁（早上頁：06:00 - 12:00）
                const morningHtml = `
                    <div class="layout-table" style="border-bottom: 2px solid #333333; padding-bottom: 6px; margin-bottom: 12px;">
                        <div class="layout-cell" style="vertical-align: bottom;"><div class="title-main" style="font-size:15pt;">${headerTitle}</div></div>
                        <div class="layout-cell header-meta-right" style="width: 220px;">
                            <div class="weather-group-box">☀️ ☁️ 🌧️</div>
                            <span style="font-size:10.5pt; margin-left:8px;">起床：__:__ ＆nbsp; 出門：__:__</span>
                        </div>
                    </div>
                    <div class="title-sub" style="margin-top: 5px; font-size: 11pt;">🌅 朝早行程時間軸 (06:00 - 12:00)</div>
                    ${makeTimeline(6, 12)}
                    <div class="title-sub" style="font-size: 11pt;">🍳 食咗咩</div>
                    ${makeHandwriteTable("食物名稱", "價錢", "備註／餐廳名", 6)}
                    <div class="title-sub" style="font-size: 11pt;">🛍️ 買咗咩</div>
                    ${makeHandwriteTable("物品名稱", "價錢", "購買地點", 9)}
                `;
                outputHTML += printContentPage(morningHtml, true);

                // ▶ 每日第2頁（中午至下午頁：12:00 - 18:00）
                const afternoonHtml = `
                    <div class="layout-table" style="border-bottom: 2px solid #333333; padding-bottom: 6px; margin-bottom: 12px;">
                        <div class="layout-cell" style="vertical-align: bottom;"><div class="title-main" style="font-size:15pt;">${headerTitle}</div></div>
                        <div class="layout-cell header-meta-right" style="width: 100px;"><div class="weather-group-box">☀️ ☁️ 🌧️</div></div>
                    </div>
                    <div class="title-sub" style="margin-top: 5px; font-size: 11pt;">☀️ 下午行程時間軸 (12:00 - 18:00)</div>
                    ${makeTimeline(12, 18)}
                    <div class="title-sub" style="font-size: 11pt;">🍱 食咗咩</div>
                    ${makeHandwriteTable("食物名稱", "價錢", "備註／餐廳名", 6)}
                    <div class="title-sub" style="font-size: 11pt;">🛍️ 買咗咩</div>
                    ${makeHandwriteTable("物品名稱", "價錢", "購買地點", 9)}
                `;
                outputHTML += printContentPage(afternoonHtml, true);

                // ▶ 每日第3頁（晚上頁：18:00 - 23:00）
                const eveningHtml = `
                    <div class="layout-table" style="border-bottom: 2px solid #333333; padding-bottom: 6px; margin-bottom: 12px;">
                        <div class="layout-cell" style="vertical-align: bottom;"><div class="title-main" style="font-size:15pt;">${headerTitle}</div></div>
                        <div class="layout-cell header-meta-right" style="width: 100px;"><div class="weather-group-box">☀️ ☁️ 🌧️</div></div>
                    </div>
                    <div class="title-sub" style="margin-top: 5px; font-size: 11pt;">🌙 晚上行程時間軸 (18:00 - 23:00)</div>
                    ${makeTimeline(18, 23)}
                    <div class="title-sub" style="font-size: 11pt;">🌌 食咗咩</div>
                    ${makeHandwriteTable("食物名稱", "價錢", "備註／餐廳名", 6)}
                    <div class="title-sub" style="font-size: 11pt;">🛍️ 買咗咩</div>
                    ${makeHandwriteTable("物品名稱", "價錢", "購買地點", 9)}
                `;
                outputHTML += printContentPage(eveningHtml, true);
            }

            /* ==========================================
               全日支出總結頁 (每15天自動分頁)
            ========================================== */
            for (let e = 0; e < expensePages; e++) {
                let expRows = '';
                const startExpIdx = (e * 15) + 1;
                const endExpIdx = Math.min(startExpIdx + 14, tripDays);

                for (let i = startExpIdx; i <= endExpIdx; i++) {
                    const dayObj = getOffsetDateFullStr(startDate, i - 1);
                    expRows += `
                        <tr>
                            <td style="height: 38px; font-weight: bold; text-align: center;">Day ${i}<br><span style="font-size:9pt; font-weight:normal; color:#555;">${dayObj.date}（${dayObj.week}）</span></td>
                            <td></td><td></td><td></td><td></td><td></td>
                        </tr>
                    `;
                }

                const isLastExpensePage = (e === expensePages - 1);
                const totalSummaryFieldHtml = isLastExpensePage ? `
                    <div style="margin-top: 30px; text-align: right; padding-right: 5mm;">
                        <span class="title-main" style="font-size: 14pt;">總使費： ${currency} ___________________________</span>
                    </div>
                ` : '';

                const expenseHtml = `
                    <div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 15px;">全日支出總結 Expense Summary</div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 22%; text-align: center;">日期（星期X）</th>
                                <th style="width: 15.5%;">交通</th>
                                <th style="width: 15.5%;">飲食</th>
                                <th style="width: 15.5%;">購物</th>
                                <th style="width: 15.5%;">雜項</th>
                                <th style="width: 16%; background-color: #fcfcfc;">合計</th>
                            </tr>
                        </thead>
                        <tbody>${expRows}</tbody>
                    </table>
                    ${totalSummaryFieldHtml}
                `;
                outputHTML += printContentPage(expenseHtml, false);
            }

            /* ==========================================
               後置頁面：最後2頁 (單據收納、地圖貼貼)
            ========================================== */
            outputHTML += printContentPage('<div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px;">單據收納頁 Receipts</div><div style="height:230mm;"></div>', false);
            outputHTML += printContentPage('<div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px;">地圖 ／ 單張貼貼頁 Maps & Mementos</div><div style="height:230mm;"></div>', false);

            // 輸出至渲染節點並調用系統列印
            document.getElementById('pdf-render-zone').innerHTML = outputHTML;
            window.print();
        }
    </script>
</body>
</html>
