<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行手帳PDF生成器</title>
    <style>
        /* 全網頁字型與基礎設定 */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', 'PingFang SC', 'Segoe UI', sans-serif;
            background-color: #f0f4f8;
            color: #333333;
        }

        /* 網頁操作界面樣式 */
        .ui-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1.ui-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24pt;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 11pt;
        }

        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 11pt;
            font-family: inherit;
            color: #333;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }

        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #3498db;
        }

        .range-value {
            font-weight: bold;
            color: #3498db;
            font-size: 12pt;
            min-width: 45px;
            text-align: right;
        }

        .section-header {
            margin-top: 30px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
            color: #2c3e50;
            font-weight: bold;
            font-size: 13pt;
        }

        .city-inputs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .city-input-item {
            background-color: #f8fafc;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .city-input-item span {
            font-weight: bold;
            color: #64748b;
            font-size: 10pt;
            white-space: nowrap;
        }

        .city-input-item input {
            width: 100%;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-family: inherit;
            font-size: 10pt;
        }

        .btn-generate {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14pt;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.15);
        }

        .btn-generate:hover {
            background-color: #27ae60;
        }

        .btn-generate:active {
            transform: scale(0.99);
        }

        /* PDF 列印內容容器預設隱藏 */
        #pdf-print-area {
            display: none;
        }

        /* ------------------------------------------
           PDF 列印專用樣式規格 (A4 直向)
        ------------------------------------------ */
        @media print {
            /* 隱藏網頁操作界面 */
            .ui-container {
                display: none !important;
            }

            #pdf-print-area {
                display: block !important;
            }

            body {
                background-color: #ffffff;
            }

            @page {
                size: A4 portrait;
                margin: 0;
            }

            /* 有內容頁面規格 */
            .pdf-page {
                width: 210mm;
                height: 297mm;
                page-break-after: always;
                position: relative;
                background-color: #ffffff;
                padding: 22mm 18mm 20mm 18mm;
                overflow: hidden;
                box-sizing: border-box;
            }

            /* 完全空白頁規格 */
            .blank-page {
                width: 210mm;
                height: 297mm;
                page-break-after: always;
                background-color: #ffffff;
                box-sizing: border-box;
            }

            /* 防止最後一頁產生多餘空白頁 */
            .pdf-page:last-child, .blank-page:last-child {
                page-break-after: avoid !important;
            }

            /* 可手寫橫底線 */
            .ul-line {
                border-bottom: 1px solid #000000;
                display: inline-block;
                min-width: 60mm;
                height: 22px;
                vertical-align: bottom;
                margin-bottom: 2px;
            }

            .ul-line-short {
                min-width: 35mm;
            }

            .ul-line-long {
                min-width: 120mm;
            }

            /* 頁底中央連續頁碼 */
            .page-number {
                position: absolute;
                bottom: 12mm;
                left: 0;
                right: 0;
                text-align: center;
                font-size: 10pt;
                color: #888888;
            }

            /* 頁底左下標籤 */
            .footer-left {
                position: absolute;
                bottom: 12mm;
                left: 18mm;
                font-size: 10pt;
                color: #888888;
            }

            /* 頁底右下標籤 */
            .footer-right {
                position: absolute;
                bottom: 12mm;
                right: 18mm;
                font-size: 10pt;
                color: #888888;
                text-align: right;
            }

            /* 左右多欄雙格對齊佈局 */
            .layout-columns {
                display: table;
                width: 100%;
                table-layout: fixed;
            }

            .layout-column {
                display: table-cell;
                vertical-align: top;
            }

            /* 標準外框表格樣式 (填寫用格線) */
            .data-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
                margin-bottom: 15px;
            }

            .data-table th, .data-table td {
                border: 1px solid #CCCCCC;
                padding: 8px 10px;
                text-align: left;
                vertical-align: middle;
                font-size: 11pt;
            }

            .data-table th {
                background-color: #fdfdfd;
                font-weight: bold;
                font-size: 12pt;
            }

            /* 字體尺寸規格設定 */
            .title-large { font-size: 56pt; font-weight: bold; }
            .title-main { font-size: 16pt; font-weight: bold; }
            .title-sub { font-size: 14pt; font-weight: bold; color: #000000; margin-top: 20px; margin-bottom: 10px; }
            .text-normal { font-size: 12pt; }

            /* 航班與住宿特別高行距設定 */
            .line-height-double p {
                line-height: 2.0 !important;
                margin: 5px 0;
            }

            /* 封面專用對齊排版 */
            .cover-layout {
                text-align: center;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            /* 時間軸行程排版 */
            .timeline-container {
                margin-top: 15px;
                margin-bottom: 20px;
            }

            .timeline-item {
                display: table;
                width: 100%;
                margin-bottom: 10px;
            }

            .timeline-hour {
                display: table-cell;
                width: 65px;
                font-weight: bold;
                font-size: 12pt;
                color: #333333;
                vertical-align: bottom;
            }

            .timeline-line-fill {
                display: table-cell;
                border-bottom: 1px solid #000000;
                height: 22px;
            }

            /* 每日頁頂狀態欄 */
            .diary-header-right {
                text-align: right;
                font-size: 12pt;
                line-height: 1.6;
            }

            .weather-select-box {
                font-size: 13pt;
                letter-spacing: 6px;
                border: 1px dashed #CCCCCC;
                padding: 2px 6px;
                border-radius: 4px;
                display: inline-block;
                margin-bottom: 4px;
            }

            /* 開放式手寫開放式橫線 */
            .open-lines-block {
                margin-bottom: 15px;
            }

            .open-handwrite-line {
                border-bottom: 1px solid #000000;
                height: 28px;
                margin-bottom: 2px;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="ui-container">
        <h1 class="ui-title">✈️ 通用旅行手帳 PDF 生成器</h1>
        
        <div class="form-group">
            <label for="input-trip-name">旅程名稱</label>
            <input type="text" id="input-trip-name" placeholder="例如：2026 東京春之櫻 / 2026 曼谷遊" value="首爾之旅 2026">
        </div>

        <div class="form-group">
            <label for="input-start-date">出發日期</label>
            <input type="date" id="input-start-date">
        </div>

        <div class="form-group">
            <label for="input-currency">貨幣符號</label>
            <input type="text" id="input-currency" placeholder="例如：¥ / ฿ / € / $" value="₩">
        </div>

        <div class="form-group">
            <label for="input-trip-days">旅行日數 (1 - 30 日)</label>
            <div class="range-container">
                <input type="range" id="input-trip-days" min="1" max="30" value="5" oninput="onDaysSliderChange(this.value)">
                <span id="label-days-val" class="range-value">5 日</span>
            </div>
        </div>

        <div class="form-group">
            <label for="input-hotel-count">住宿數量 (1 - 10 間)</label>
            <div class="range-container">
                <input type="range" id="input-hotel-count" min="1" max="10" value="2" oninput="onHotelsSliderChange(this.value)">
                <span id="label-hotels-val" class="range-value">2 間</span>
            </div>
        </div>

        <div class="section-header">每日主打城市／地區設定</div>
        <div id="city-inputs-wrapper" class="city-inputs-grid">
            </div>

        <button type="button" class="btn-generate" onclick="actionGenerateJournalPDF()">✨ 生成手帳 PDF</button>
    </div>

    <div id="pdf-print-area"></div>

    <script>
        // 設定網頁載入時之預設日期為當天
        document.getElementById('input-start-date').valueAsDate = new Date();

        function onDaysSliderChange(val) {
            document.getElementById('label-days-val').innerText = val + ' 日';
            refreshCityFields(parseInt(val));
        }

        function onHotelsSliderChange(val) {
            document.getElementById('label-hotels-val').innerText = val + ' 間';
        }

        // 動態配給每日主打城市輸入框元件
        function refreshCityFields(days) {
            const wrapper = document.getElementById('city-inputs-wrapper');
            wrapper.innerHTML = '';
            for (let i = 1; i <= days; i++) {
                const item = document.createElement('div');
                item.className = 'city-input-item';
                item.innerHTML = `
                    <span>Day ${i} 城市:</span>
                    <input type="text" id="target-city-day-${i}" value="首爾">
                `;
                wrapper.appendChild(item);
            }
        }

        // 初始化預載 5 天範例欄位
        refreshCityFields(5);

        // 純 CSS 向量線條旅行小圖案庫 (輕量精緻線條風格，邊框 1px，色彩 #D0D0D0)
        const vectorDecorations = [
            // 飛機
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="36" height="36"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l8 2.5z"/></svg>`,
            // 地球
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="36" height="36"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
            // 行李箱
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="36" height="36"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M16 7V4a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3M3 12h18M9 12v8m6-8v8"/></svg>`,
            // 相機
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="36" height="36"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
            // 船
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="36" height="36"><path d="M2 17l3-6h14l3 6H2zM12 2v9M12 5h5M7 11V8h3"/></svg>`,
            // 火車
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="36" height="36"><rect x="4" y="3" width="16" height="15" rx="2"/><circle cx="8" cy="14" r="1"/><circle cx="16" cy="14" r="1"/><path d="M2 21h20M5 9h14M9 3v6m6-6v6"/></svg>`,
            // 指南針
            `<svg viewBox="0 0 24 24" fill="none" stroke="#D0D0D0" stroke-width="1" width="36" height="36"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>`
        ];

        // 隨機抽選分發 2-3 款線條圖案置於四個角落位置
        function fetchPageDecorations() {
            const count = Math.random() > 0.5 ? 3 : 2;
            const elements = [...vectorDecorations].sort(() => 0.5 - Math.random());
            const activeItems = elements.slice(0, count);
            
            const layoutStyles = [
                "top: 6mm; left: 6mm;",
                "top: 6mm; right: 6mm;",
                "bottom: 18mm; left: 6mm;",
                "bottom: 18mm; right: 6mm;"
            ];
            const sortedStyles = layoutStyles.sort(() => 0.5 - Math.random());
            
            let nodesStr = '';
            for (let i = 0; i < count; i++) {
                nodesStr += `<div style="position: absolute; ${sortedStyles[i]} z-index: 5; opacity: 0.85;">${activeItems[i]}</div>`;
            }
            return nodesStr;
        }

        // 精確推算日期文字格式 (包含星期項目)
        function formatCalculatedDate(originDateStr, daysOffset) {
            if (!originDateStr) return { compact: '____-__-__', week: '星期_' };
            const current = new Date(originDateStr);
            current.setDate(current.getDate() + daysOffset);
            
            const yr = current.getFullYear();
            const mo = String(current.getMonth() + 1).padStart(2, '0');
            const dy = String(current.getDate()).padStart(2, '0');
            
            const weeksList = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            return {
                compact: `${yr}-${mo}-${dy}`,
                week: weeksList[current.getDay()]
            };
        }

        // 生成開放式手寫橫線區塊 (10條開放式橫線)
        function buildOpenLinesMarkup() {
            let lines = '<div class="open-lines-block">';
            for (let i = 0; i < 10; i++) {
                lines += '<div class="open-handwrite-line"></div>';
            }
            lines += '</div>';
            return lines;
        }

        // 組配小時制行程時間軸項目
        function compileTimelineBlock(fromHour, toHour) {
            let block = '<div class="timeline-container">';
            for (let h = fromHour; h <= toHour; h++) {
                const displayLabel = String(h).padStart(2, '0') + ':00';
                block += `
                    <div class="timeline-item">
                        <div class="timeline-hour">${displayLabel}</div>
                        <div class="timeline-line-fill"></div>
                    </div>
                `;
            }
            block += '</div>';
            return block;
        }

        // 核心調配組件主程序
        function actionGenerateJournalPDF() {
            const tripName = document.getElementById('input-trip-name').value || '通用旅行手帳';
            const startDate = document.getElementById('input-start-date').value;
            const currencySymbol = document.getElementById('input-currency').value || '$';
            const tripTotalDays = parseInt(document.getElementById('input-trip-days').value);
            const hotelCountTotal = parseInt(document.getElementById('input-hotel-count').value);

            // 計算有內容之總頁面數量
            const totalContentPagesCount = 4 + (tripTotalDays * 3) + 2;
            let currentContentPageIndex = 1;
            let resultHTMLMarkup = '';

            // 結構封裝函數：產生內容頁及配套之交替完全空白雙數頁面
            function injectPrintPage(innerContentMarkup, requiresBlankPageAfter = false) {
                const decors = fetchPageDecorations();
                const standardFooters = `
                    <div class="footer-left">cms.hongkong-travel.journal.generator</div>
                    <div class="page-number">${currentContentPageIndex} / ${totalContentPagesCount}</div>
                    <div class="footer-right">${tripName}</div>
                `;
                currentContentPageIndex++;

                let packageMarkup = `
                    <div class="pdf-page">
                        ${decors}
                        ${innerContentMarkup}
                        ${standardFooters}
                    </div>
                `;
                
                // 只有在行程頁（早、午、晚）後面插入完全空白的頁面
                if (requiresBlankPageAfter) {
                    packageMarkup += `<div class="blank-page"></div>`;
                }
                return packageMarkup;
            }

            /* ==========================================
               第1頁：封面頁
            ========================================== */
            const page1Cover = `
                <div class="cover-layout">
                    <div class="title-large" style="margin-top: 10px; word-break: break-word; max-width: 90%;">${tripName}</div>
                </div>
            `;
            resultHTMLMarkup += injectPrintPage(page1Cover, false);

            /* ==========================================
               第2頁：航班資料
            ========================================== */
            const outBoundDateInfo = startDate ? startDate : '____-__-__';
            const inBoundDateObj = formatCalculatedDate(startDate, tripTotalDays - 1);
            const inBoundDateInfo = inBoundDateObj.compact;

            const page2Flights = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 25px;">航班資料 Flight Profile</div>
                
                <div class="line-height-double" style="margin-top: 20px;">
                    <div class="title-sub">出發航班 ✈️</div>
                    <p class="text-normal" style="margin-bottom: 12px;">出發日期：${outBoundDateInfo}</p>
                    <p class="text-normal">航班編號：<span class="ul-line"></span></p>
                    <p class="text-normal">出發時間：<span class="ul-line"></span> ／ 到達時間：<span class="ul-line"></span></p>
                    <p class="text-normal">Terminal：<span class="ul-line"></span> ／ 座位：<span class="ul-line"></span></p>
                    <p class="text-normal">機票價錢：<span class="ul-line"></span></p>
                </div>

                <div class="line-height-double" style="margin-top: 45px;">
                    <div class="title-sub">回程航班 ✈️</div>
                    <p class="text-normal" style="margin-bottom: 12px;">回程日期：${inBoundDateInfo}</p>
                    <p class="text-normal">航班編號：<span class="ul-line"></span></p>
                    <p class="text-normal">出發時間：<span class="ul-line"></span> ／ 到達時間：<span class="ul-line"></span></p>
                    <p class="text-normal">Terminal：<span class="ul-line"></span> ／ 座位：<span class="ul-line"></span></p>
                    <p class="text-normal">機票價錢：<span class="ul-line"></span></p>
                </div>
            `;
            resultHTMLMarkup += injectPrintPage(page2Flights, false);

            /* ==========================================
               第3頁：住宿資料
            ========================================== */
            let compiledHotelsMarkup = '';
            for (let h = 1; h <= hotelCountTotal; h++) {
                compiledHotelsMarkup += `
                    <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #CCCCCC;">
                        <div class="title-sub" style="margin-top: 0; color: #2c3e50;">酒店 ${h}</div>
                        <div class="line-height-double">
                            <p class="text-normal">酒店名：<span class="ul-line ul-line-long"></span></p>
                            <p class="text-normal">地址：<span class="ul-line ul-line-long"></span></p>
                            <p class="text-normal">電話：<span class="ul-line"></span></p>
                            <p class="text-normal">Check-in時間：<span class="ul-line"></span></p>
                            <p class="text-normal">Check-out時間：<span class="ul-line"></span></p>
                            <p class="text-normal">包早餐（□包  □唔包）</p>
                            <p class="text-normal">免費取消期限：<span class="ul-line"></span></p>
                            <p class="text-normal">幾多晚：<span class="ul-line"></span></p>
                            <p class="text-normal">價錢：<span class="ul-line"></span></p>
                            <p class="text-normal">免費泊車（□有  □無）</p>
                            <p class="text-normal">預訂編號：<span class="ul-line"></span></p>
                        </div>
                    </div>
                `;
            }

            const page3Hotels = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 20px;">住宿資料 Accommodation</div>
                <div style="max-height: 245mm; overflow: hidden;">
                    ${compiledHotelsMarkup}
                </div>
            `;
            resultHTMLMarkup += injectPrintPage(page3Hotels, false);

            /* ==========================================
               第4頁：總行程一覽
            ========================================== */
            let overviewRowsMarkup = '';
            for (let i = 1; i <= tripTotalDays; i++) {
                const dateMeta = formatCalculatedDate(startDate, i - 1);
                const assignedCity = document.getElementById(`target-city-day-${i}`).value || '自由行';
                overviewRowsMarkup += `
                    <tr>
                        <td style="height: 40px; font-weight: bold;">Day ${i}<br><span style="font-size: 9.5pt; color: #555; font-weight: normal;">${dateMeta.compact} ${dateMeta.week}</span></td>
                        <td style="font-weight: bold; font-size: 11pt;">${assignedCity}</td>
                        <td></td>
                    </tr>
                `;
            }

            const page4Overview = `
                <div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px; margin-bottom: 20px;">總行程一覽 Overview</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 30%;">日期</th>
                            <th style="width: 35%;">主打城市 / 地區</th>
                            <th style="width: 35%;">今晚住邊間酒店</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${overviewRowsMarkup}
                    </tbody>
                </table>
            `;
            resultHTMLMarkup += injectPrintPage(page4Overview, false);

            /* ==========================================
               每日行程頁 (每日3頁，自動重複生成)
            ========================================== */
            for (let i = 1; i <= tripTotalDays; i++) {
                const currentDayMeta = formatCalculatedDate(startDate, i - 1);
                const currentCityStr = document.getElementById(`target-city-day-${i}`).value || '自由行';
                const baseHeaderTitle = `Day ${i} ｜ ${currentCityStr} ｜ ${currentDayMeta.compact}`;

                // ---- ▶ 每日第1頁（早上頁） ----
                const morningTimeline = compileTimelineBlock(6, 12);
                const morningPageContent = `
                    <div class="layout-columns" style="border-bottom: 2px solid #333333; padding-bottom: 6px; margin-bottom: 15px;">
                        <div class="layout-column" style="vertical-align: bottom;">
                            <div class="title-main" style="font-size: 16pt; font-weight: bold;">${baseHeaderTitle}</div>
                        </div>
                        <div class="layout-column diary-header-right" style="width: 180px;">
                            <div class="weather-select-box">☀️ ☁️ 🌧️</div><br>
                            起床：<span class="ul-line" style="min-width:30px; height:18px;"></span> : <span class="ul-line" style="min-width:30px; height:18px;"></span><br>
                            出門：<span class="ul-line" style="min-width:30px; height:18px;"></span> : <span class="ul-line" style="min-width:30px; height:18px;"></span>
                        </div>
                    </div>
                    
                    <div class="title-sub" style="margin-top: 10px; font-size: 12pt;">🌅 朝早行程時間軸 (06:00 - 12:00)</div>
                    ${morningTimeline}
                    
                    <div class="layout-columns" style="margin-top: 20px;">
                        <div class="layout-column" style="width: 49%; padding-right: 15px;">
                            <div class="title-sub" style="margin-top: 0; font-size: 12pt; border-bottom: 1px dashed #bbb; padding-bottom: 4px;">🍳 食咗咩</div>
                            ${buildOpenLinesMarkup()}
                        </div>
                        <div class="layout-column" style="width: 49%; padding-left: 15px; border-left: 1px dashed #CCCCCC;">
                            <div class="title-sub" style="margin-top: 0; font-size: 12pt; border-bottom: 1px dashed #bbb; padding-bottom: 4px;">🛍️ 買咗咩</div>
                            ${buildOpenLinesMarkup()}
                        </div>
                    </div>
                `;
                resultHTMLMarkup += injectPrintPage(morningPageContent, true);

                // ---- ▶ 每日第2頁（中午至下午頁） ----
                const afternoonTimeline = compileTimelineBlock(12, 18);
                const afternoonPageContent = `
                    <div class="layout-columns" style="border-bottom: 2px solid #333333; padding-bottom: 6px; margin-bottom: 15px;">
                        <div class="layout-column" style="vertical-align: bottom;">
                            <div class="title-main" style="font-size: 16pt; font-weight: bold;">${baseHeaderTitle}</div>
                        </div>
                        <div class="layout-column diary-header-right" style="width: 100px;">
                            <div class="weather-select-box">☀️ ☁️ 🌧️</div>
                        </div>
                    </div>
                    
                    <div class="title-sub" style="margin-top: 10px; font-size: 12pt;">☀️ 下午行程時間軸 (12:00 - 18:00)</div>
                    ${afternoonTimeline}
                    
                    <div class="layout-columns" style="margin-top: 20px;">
                        <div class="layout-column" style="width: 49%; padding-right: 15px;">
                            <div class="title-sub" style="margin-top: 0; font-size: 12pt; border-bottom: 1px dashed #bbb; padding-bottom: 4px;">🍱 食咗咩</div>
                            ${buildOpenLinesMarkup()}
                        </div>
                        <div class="layout-column" style="width: 49%; padding-left: 15px; border-left: 1px dashed #CCCCCC;">
                            <div class="title-sub" style="margin-top: 0; font-size: 12pt; border-bottom: 1px dashed #bbb; padding-bottom: 4px;">🛍️ 買咗咩</div>
                            ${buildOpenLinesMarkup()}
                        </div>
                    </div>
                `;
                resultHTMLMarkup += injectPrintPage(afternoonPageContent, true);

                // ---- ▶ 每日第3頁（晚上頁） ----
                const eveningTimeline = compileTimelineBlock(18, 23);
                const eveningPageContent = `
                    <div class="layout-columns" style="border-bottom: 2px solid #333333; padding-bottom: 6px; margin-bottom: 15px;">
                        <div class="layout-column" style="vertical-align: bottom;">
                            <div class="title-main" style="font-size: 16pt; font-weight: bold;">${baseHeaderTitle}</div>
                        </div>
                        <div class="layout-column diary-header-right" style="width: 100px;">
                            <div class="weather-select-box">☀️ ☁️ 🌧️</div>
                        </div>
                    </div>
                    
                    <div class="title-sub" style="margin-top: 10px; font-size: 12pt;">🌙 晚上行程時間軸 (18:00 - 23:00)</div>
                    ${eveningTimeline}
                    
                    <div class="layout-columns" style="margin-top: 20px;">
                        <div class="layout-column" style="width: 49%; padding-right: 15px;">
                            <div class="title-sub" style="margin-top: 0; font-size: 12pt; border-bottom: 1px dashed #bbb; padding-bottom: 4px;">🌌 食咗咩</div>
                            ${buildOpenLinesMarkup()}
                        </div>
                        <div class="layout-column" style="width: 49%; padding-left: 15px; border-left: 1px dashed #CCCCCC;">
                            <div class="title-sub" style="margin-top: 0; font-size: 12pt; border-bottom: 1px dashed #bbb; padding-bottom: 4px;">🛍️ 買咗咩</div>
                            ${buildOpenLinesMarkup()}
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <div class="title-sub" style="font-size: 11pt; margin-bottom: 5px;">💰 全日支出總結</div>
                        <table class="data-table" style="margin-top: 5px; margin-bottom: 0;">
                            <thead>
                                <tr>
                                    <th style="width: 50%; text-align: center; padding: 6px;">類別</th>
                                    <th style="width: 50%; text-align: center; padding: 6px;">金額</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td style="text-align: center; padding: 6px;">交通</td><td>${currencySymbol} <span class="ul-line ul-line-long" style="min-width: 60mm; height:18px;"></span></td></tr>
                                <tr><td style="text-align: center; padding: 6px;">飲食</td><td>${currencySymbol} <span class="ul-line ul-line-long" style="min-width: 60mm; height:18px;"></span></td></tr>
                                <tr><td style="text-align: center; padding: 6px;">購物</td><td>${currencySymbol} <span class="ul-line ul-line-long" style="min-width: 60mm; height:18px;"></span></td></tr>
                                <tr><td style="text-align: center; padding: 6px;">雜項</td><td>${currencySymbol} <span class="ul-line ul-line-long" style="min-width: 60mm; height:18px;"></span></td></tr>
                                <tr style="background-color: #fafafa; font-weight: bold;"><td style="text-align: center; padding: 6px;">合計</td><td>${currencySymbol} <span class="ul-line ul-line-long" style="min-width: 60mm; height:18px; border-bottom-width: 2px;"></span></td></tr>
                            </tbody>
                        </table>
                    </div>
                `;
                resultHTMLMarkup += injectPrintPage(eveningPageContent, true);
            }

            /* ==========================================
               後置頁面：單據收納頁 ＆ 地圖單張貼貼頁 (最後2頁)
            ========================================== */
            // 倒數第2頁：單據收納頁
            resultHTMLMarkup += injectPrintPage('<div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px;">單據收納頁 Receipts</div>', false);
            
            // 最後1頁：地圖／單張貼貼頁
            resultHTMLMarkup += injectPrintPage('<div class="title-main" style="text-align:center; border-bottom: 2px solid #333333; padding-bottom: 8px;">地圖 ／ 單張貼貼頁 Maps & Mementos</div>', false);

            // 將生成的完整結構代碼塞入列印工作節點並調用原生列印系統
            document.getElementById('pdf-print-area').innerHTML = resultHTMLMarkup;
            window.print();
        }
    </script>
</body>
</html>
